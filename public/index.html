<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout — Análisis de Apuestas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap');
:root{
  --bg:#0b0d11;--s1:#13161c;--s2:#1a1e27;
  --bd:rgba(255,255,255,.07);--bds:rgba(255,255,255,.13);
  --t:#dde1eb;--tm:#6b7491;--td:#3a3f55;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.shell{max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:.5px solid var(--bd)}
.hdr-left h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hdr-left p{font-size:13px;color:var(--t);opacity:.7;margin-top:2px}
.hdr-date{font-size:12px;color:var(--td);text-align:right}

/* day section */
.day-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--td);font-weight:600;margin-bottom:.625rem;display:flex;align-items:center;gap:8px}
.day-label::after{content:'';flex:1;height:.5px;background:var(--bd)}
.day-count{font-size:11px;color:var(--tm);background:var(--s2);padding:2px 8px;border-radius:20px}

/* event cards */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.625rem;margin-bottom:1.5rem}
.event-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:.875rem 1rem;cursor:pointer;transition:border-color .15s,background .15s}
.event-card:hover{background:var(--s2);border-color:var(--bds)}
.event-card.active{border-color:var(--green);background:rgba(74,222,128,.04)}
.ec-time{font-size:12px;color:var(--tm);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.ec-live{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ec-teams{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px}
.ec-teams .vs{color:var(--td);font-weight:400;font-size:11px;margin:0 4px}
.ec-league{font-size:11px;color:var(--purple)}

/* loading */
.loading-bar{display:flex;align-items:center;gap:10px;padding:2rem 0;color:var(--tm);font-size:13px}
.spin{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--td);font-size:13px;padding:1rem 0;font-style:italic}
.err-box{background:rgba(248,113,113,.07);border:.5px solid rgba(248,113,113,.2);border-radius:var(--r);padding:.875rem 1rem;color:var(--red);font-size:13px}

#analysisPanel{margin-top:1.5rem;display:none}

/* scoreboard */
.scoreboard{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:.875rem}
.sb-inner{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin:.5rem 0}
.sb-team{flex:1;text-align:center}
.sb-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff}
.sb-sub{font-size:11px;color:var(--tm);margin-top:2px}
.sb-score{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:#fff;letter-spacing:-.02em;text-align:center;min-width:80px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.pill-live{background:rgba(248,113,113,.15);color:var(--red)}
.pill-ns{background:rgba(96,165,250,.1);color:var(--blue)}
.pill-fin{background:rgba(74,222,128,.1);color:var(--green)}

/* meta strip */
.meta-strip{display:flex;gap:8px;margin-bottom:.875rem;flex-wrap:wrap}
.meta-box{flex:1;min-width:90px;background:var(--s1);border:.5px solid var(--bd);border-radius:var(--r);padding:.625rem .875rem;text-align:center}
.mb-label{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mb-val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap;border-bottom:.5px solid var(--bd);padding-bottom:.5rem}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid transparent;color:var(--tm);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t);background:var(--s2)}
.tab.active{background:var(--s2);border-color:var(--bds);color:#fff}

/* market cards */
.market-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.75rem}
.market-card.highlighted{border-color:rgba(74,222,128,.3)}
.mc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:.875rem}
.mc-icon{width:34px;height:34px;border-radius:var(--r);background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:var(--tm)}
.mc-title{font-size:15px;font-weight:500;color:#fff;margin-bottom:4px}
.mc-sub{font-size:13px;color:var(--t);line-height:1.6;opacity:.8}
.mc-prob{text-align:right;margin-left:auto;flex-shrink:0}
.mc-prob-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}
.mc-prob-lbl{font-size:10px;color:var(--td);margin-top:1px}

/* bar rows */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.bar-label{min-width:80px;color:var(--t)}
.bar-track{flex:1;height:5px;background:var(--s2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.bar-val{min-width:38px;text-align:right;font-weight:600;font-size:13px;color:var(--t)}

/* team compare grid */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.875rem}
.team-col{background:var(--s2);border-radius:var(--r);padding:10px}
.tc-name{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:.5px solid var(--bd)}
.tc-row:last-child{border-bottom:none}
.tc-val{font-weight:500}

/* rec line */
.rec-line{display:flex;align-items:center;gap:8px;background:rgba(74,222,128,.06);border:.5px solid rgba(74,222,128,.15);border-radius:var(--r);padding:8px 12px;margin-top:.75rem;font-size:13px;color:var(--t)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

/* stat card */
.stat-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.75rem}
.sc-title{font-size:11px;color:var(--tm);font-weight:500;margin-bottom:.875rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
@media(max-width:600px){.g2{grid-template-columns:1fr}}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.stat-row:last-child{border-bottom:none}
.sk{color:var(--t);opacity:.75}

/* form dots */
.form-dots{display:flex;gap:4px;margin-bottom:.75rem}
.dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dot-W{background:rgba(74,222,128,.2);color:var(--green)}
.dot-D{background:rgba(251,191,36,.15);color:var(--yellow)}
.dot-L{background:rgba(248,113,113,.15);color:var(--red)}

/* recent games */
.recent-game{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.recent-game:last-child{border-bottom:none}
.rg-res{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rg-opp{flex:1;color:var(--t);opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rg-score{color:var(--t);font-weight:500}
.rg-date{color:var(--td);font-size:10px;min-width:50px;text-align:right}

/* h2h */
.h2h-3{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;text-align:center;margin-bottom:.75rem}
.h2h-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}
.h2h-lbl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.06em}
.prob-track{height:5px;background:var(--s2);border-radius:99px;overflow:hidden;display:flex}
.prob-fill{height:100%;border-radius:99px}

/* prediction tab */
.pred-banner{background:var(--s2);border-radius:var(--rl);padding:1.25rem;margin-bottom:.75rem;text-align:center}
.pred-result{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.pred-sub{font-size:13px;color:var(--t);opacity:.75}
.pred-scores{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:.875rem}
.pred-score-box{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--r);padding:8px 14px;text-align:center;min-width:70px}
.psb-score{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff}
.psb-prob{font-size:11px;color:var(--td);margin-top:2px}

.pred-numbers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.pn-box{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem;text-align:center}
.pn-label{font-size:12px;color:var(--t);opacity:.75;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.pn-val{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#fff}
.pn-unit{font-size:12px;color:var(--tm);margin-top:3px}
.pn-range{font-size:12px;color:var(--tm);margin-top:2px}

/* lineups */
.player-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.player-row:last-child{border-bottom:none}
.p-num{font-size:11px;color:var(--td);min-width:20px}
.p-name{flex:1;font-size:13px}
.p-pos{font-size:10px;color:var(--tm);background:var(--s2);padding:2px 7px;border-radius:20px}
.p-score{font-size:10px;color:var(--td)}

/* section title */
.sec-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tm);font-weight:600;margin-bottom:.75rem}
.no-data{color:var(--td);font-size:13px;font-style:italic;padding:.5rem 0}
.weather-strip{display:flex;gap:1.5rem;flex-wrap:wrap}
.wi .wl{font-size:10px;color:var(--td)}
.wi .wv{font-size:14px;font-weight:500}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-left">
      <h1>⚽ Scout</h1>
      <p>Motor cuantitativo de análisis de apuestas</p>
    </div>
    <div class="hdr-date" id="hdrDate"></div>
  </div>

  <div id="eventsArea">
    <div class="loading-bar"><div class="spin"></div> Cargando partidos de hoy y mañana…</div>
  </div>

  <div id="analysisPanel"></div>

</div>
<script>
const $ = id => document.getElementById(id);

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit', timeZone:'America/Panama' });
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', timeZone:'America/Panama' });
}
function pColor(p) {
  return p >= 60 ? 'var(--green)' : p >= 40 ? 'var(--yellow)' : 'var(--red)';
}
function barColor(p) {
  return p >= 65 ? '#4ade80' : p >= 45 ? '#fbbf24' : '#f87171';
}

$('hdrDate').innerHTML = new Date().toLocaleDateString('es', {
  weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone:'America/Panama'
});

// ── load events ───────────────────────────────────────────────
async function loadEvents() {
  try {
    const r = await fetch('/api/today');
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderEvents(data);
  } catch(e) {
    $('eventsArea').innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }
}

function renderEvents({ today=[], tomorrow=[] }) {
  if (!today.length && !tomorrow.length) {
    $('eventsArea').innerHTML = '<div class="empty">No hay partidos programados para hoy ni mañana.</div>';
    return;
  }
  let html = '';
  if (today.length) {
    html += `<div class="day-label">Hoy <span class="day-count">${today.length}</span></div>`;
    html += '<div class="events-grid">' + today.map(eventCard).join('') + '</div>';
  }
  if (tomorrow.length) {
    html += `<div class="day-label">Mañana <span class="day-count">${tomorrow.length}</span></div>`;
    html += '<div class="events-grid">' + tomorrow.map(eventCard).join('') + '</div>';
  }
  $('eventsArea').innerHTML = html;
}

function eventCard(e) {
  const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(e.status);
  const isFin  = e.status === 'finished';
  const score  = (isFin||isLive) ? `${e.home_score||0}–${e.away_score||0}` : fmtTime(e.event_date);
  return `
    <div class="event-card" onclick="selectEvent(${e.id},this)">
      <div class="ec-time">
        ${isLive ? '<div class="ec-live"></div> EN VIVO' : score}
        ${e.round_name ? `<span style="margin-left:auto;font-size:10px;color:var(--td)">${e.round_name}</span>` : ''}
      </div>
      <div class="ec-teams">${e.home_team} <span class="vs">vs</span> ${e.away_team}</div>
      <div class="ec-league">${e.group_name||''}</div>
    </div>`;
}

// ── select event ──────────────────────────────────────────────
let currentId = null, currentData = null, currentTab = 'resultado';

async function selectEvent(id, el) {
  if (currentId === id) return;
  currentId = id;
  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
  el?.classList.add('active');
  const panel = $('analysisPanel');
  panel.style.display = 'block';
  panel.innerHTML = '<div class="loading-bar"><div class="spin"></div> Analizando datos — cargando stats históricas…</div>';
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
  try {
    const r = await fetch(`/api/analyze?id=${id}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    currentData = data;
    currentTab = 'resultado';
    renderAnalysis(data);
  } catch(e) {
    panel.innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  $('tabContent').innerHTML = renderTabContent(tab, currentData);
}

// ── main render ───────────────────────────────────────────────
function renderAnalysis(d) {
  const tabs = [
    { id:'resultado',  label:'Resultado' },
    { id:'goles',      label:'Goles' },
    { id:'corners',    label:'Corners' },
    { id:'tarjetas',   label:'Tarjetas' },
    { id:'offsides',   label:'Fueras de lugar' },
    { id:'prediccion', label:'🔮 Predicción' },
    { id:'equipos',    label:'Equipos' },
    { id:'alineacion', label:'Alineaciones' },
    { id:'h2h',        label:'H2H' },
  ];

  const tabsHTML = tabs.map(t =>
    `<div class="tab ${t.id===currentTab?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('');

  $('analysisPanel').innerHTML =
    renderScoreboard(d.event, d.odds) +
    renderMeta(d.meta) +
    `<div class="tabs">${tabsHTML}</div>` +
    `<div id="tabContent">${renderTabContent(currentTab, d)}</div>`;
}

function renderTabContent(tab, d) {
  switch(tab) {
    case 'resultado':  return renderResultado(d);
    case 'goles':      return renderGoles(d);
    case 'corners':    return renderCorners(d);
    case 'tarjetas':   return renderTarjetas(d);
    case 'offsides':   return renderOffsides(d);
    case 'prediccion': return renderPrediccion(d);
    case 'equipos':    return renderEquipos(d);
    case 'alineacion': return renderAlineacion(d);
    case 'h2h':        return renderH2H(d);
    default: return '';
  }
}

// ── scoreboard ────────────────────────────────────────────────
function renderScoreboard(ev, odds) {
  const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(ev.status);
  const isFin  = ev.status === 'finished';
  const isNS   = ev.status === 'notstarted';
  const sc = isNS ? `<span style="font-size:18px;color:var(--td)">${fmtTime(ev.event_date)}</span>`
    : `${ev.home_score||'–'}<span style="color:var(--td);font-size:24px;margin:0 4px">–</span>${ev.away_score||'–'}`;
  const statusLabel = {notstarted:'Por jugar',finished:'Finalizado','1st_half':'1ª Parte','2nd_half':'2ª Parte',halftime:'Descanso',inprogress:'En Juego',postponed:'Aplazado'}[ev.status]||ev.status;
  const sClass = isLive?'pill-live':isFin?'pill-fin':'pill-ns';
  const oddsRow = (odds?.home||odds?.draw||odds?.away) ? `
    <div style="display:flex;gap:6px;margin-top:.75rem">
      ${odds.home?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:9px;color:var(--td);text-transform:uppercase;margin-bottom:2px">${ev.home_team.split(' ')[0]}</div><div style="font-size:15px;font-weight:500">${odds.home.toFixed(2)}</div></div>`:''}
      ${odds.draw?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:9px;color:var(--td);text-transform:uppercase;margin-bottom:2px">Empate</div><div style="font-size:15px;font-weight:500">${odds.draw.toFixed(2)}</div></div>`:''}
      ${odds.away?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:9px;color:var(--td);text-transform:uppercase;margin-bottom:2px">${ev.away_team.split(' ')[0]}</div><div style="font-size:15px;font-weight:500">${odds.away.toFixed(2)}</div></div>`:''}
    </div>` : '';
  return `
    <div class="scoreboard">
      <div style="text-align:center;margin-bottom:.75rem">
        <span class="pill ${sClass}">${statusLabel}</span>
        ${isLive&&ev.current_minute?`<span style="margin-left:8px;font-size:12px;color:var(--tm)">${ev.current_minute}'</span>`:''}
      </div>
      <div class="sb-inner">
        <div class="sb-team"><div class="sb-name">${ev.home_team}</div><div class="sb-sub">Local</div></div>
        <div class="sb-score">${sc}</div>
        <div class="sb-team"><div class="sb-name">${ev.away_team}</div><div class="sb-sub">Visitante</div></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--tm)">${fmtDate(ev.event_date)}</div>
      ${oddsRow}
    </div>`;
}

// ── meta strip ────────────────────────────────────────────────
function renderMeta(meta) {
  if (!meta) return '';
  const cc = meta.confidence >= 70 ? 'var(--green)' : meta.confidence >= 50 ? 'var(--yellow)' : 'var(--red)';
  const tc = meta.trap <= 3 ? 'var(--green)' : meta.trap <= 5 ? 'var(--yellow)' : 'var(--red)';
  const mc = Math.round((meta.model_confidence||0)*100);
  const ls = {confirmed:'✅ Confirmada',predicted:'🤖 Predicha',unavailable:'⚠️ Sin datos'}[meta.lineup_status]||'—';
  return `
    <div class="meta-strip">
      <div class="meta-box"><div class="mb-label">Confianza</div><div class="mb-val" style="color:${cc}">${meta.confidence}/100</div></div>
      <div class="meta-box"><div class="mb-label">Trap score</div><div class="mb-val" style="color:${tc}">${meta.trap}/10</div></div>
      <div class="meta-box"><div class="mb-label">Modelo ML</div><div class="mb-val">${mc}%</div></div>
      <div class="meta-box"><div class="mb-label">Alineación</div><div class="mb-val" style="font-size:12px;padding-top:4px">${ls}</div></div>
    </div>`;
}

// ── TAB: RESULTADO ────────────────────────────────────────────
function renderResultado({ event:ev, homeStats:hs, awayStats:as, prediction:pred }) {
  const mr = pred?.markets?.match_result || {};
  const hP = mr.prob_home || null;
  const dP = mr.prob_draw || null;
  const aP = mr.prob_away || null;

  // Probabilidades finales (ML + forma)
  const mc = pred?.model?.confidence || 0.3;
  const sf = Math.min(hs?.sample_factor||0, as?.sample_factor||0);
  const hForm = hs?.home_ctx?.win_pct || hs?.win_pct || 33;
  const aForm = as?.away_ctx?.win_pct || as?.win_pct || 33;
  const dForm = (((hs?.home_ctx?.draw_pct||hs?.draw_pct||25) + (as?.away_ctx?.draw_pct||as?.draw_pct||25)) / 2);

  function dynProb(ml, form) {
    if (ml == null) return Math.round(form * sf + 33 * (1 - sf));
    const w = Math.min(mc * 0.70, 0.70);
    const formAdj = form * sf + 33 * (1 - sf);
    return Math.round(ml * w + formAdj * (1 - w));
  }

  let hAdj = dynProb(hP, hForm);
  let dAdj = dynProb(dP, dForm);
  let aAdj = dynProb(aP, aForm);
  const total = hAdj + dAdj + aAdj || 100;
  hAdj = Math.round(hAdj / total * 100);
  aAdj = Math.round(aAdj / total * 100);
  dAdj = 100 - hAdj - aAdj;

  const bars = [
    { label: ev.home_team, prob: hAdj, color: 'var(--blue)' },
    { label: 'Empate',     prob: dAdj, color: 'var(--yellow)' },
    { label: ev.away_team, prob: aAdj, color: 'var(--purple)' },
  ];

  const barsHTML = bars.map(b => `
    <div class="bar-row">
      <span class="bar-label" style="min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${b.prob}%;background:${b.color}"></div></div>
      <span class="bar-val" style="color:${b.color}">${b.prob}%</span>
    </div>`).join('');

  const teamGrid = (hs && as) ? `
    <div class="team-grid" style="margin-top:.875rem">
      <div class="team-col">
        <div class="tc-name">${ev.home_team} (local)</div>
        <div class="tc-row"><span>Victorias</span><span class="tc-val" style="color:var(--green)">${hs.home_ctx?.win_pct||hs.win_pct}%</span></div>
        <div class="tc-row"><span>Empates</span><span class="tc-val" style="color:var(--yellow)">${hs.home_ctx?.draw_pct||hs.draw_pct}%</span></div>
        <div class="tc-row"><span>Goles/partido</span><span class="tc-val">${hs.home_ctx?.avg_gf||hs.avg_gf}</span></div>
        <div class="tc-row"><span>Portería a 0</span><span class="tc-val">${hs.home_ctx?.clean_sheet_pct||hs.clean_sheet_pct}%</span></div>
      </div>
      <div class="team-col">
        <div class="tc-name">${ev.away_team} (visitante)</div>
        <div class="tc-row"><span>Victorias</span><span class="tc-val" style="color:var(--green)">${as.away_ctx?.win_pct||as.win_pct}%</span></div>
        <div class="tc-row"><span>Empates</span><span class="tc-val" style="color:var(--yellow)">${as.away_ctx?.draw_pct||as.draw_pct}%</span></div>
        <div class="tc-row"><span>Goles/partido</span><span class="tc-val">${as.away_ctx?.avg_gf||as.avg_gf}</span></div>
        <div class="tc-row"><span>Portería a 0</span><span class="tc-val">${as.away_ctx?.clean_sheet_pct||as.clean_sheet_pct}%</span></div>
      </div>
    </div>` : '';

  return `
    <div class="market-card highlighted">
      <div class="mc-header">
        <div class="mc-icon">🏆</div>
        <div><div class="mc-title">Resultado final</div>
        <div class="mc-sub">ML ${hP!=null?Math.round(hP)+'%':'N/D'} · Forma local ${hForm}% victorias · Modelo confianza ${Math.round(mc*100)}%</div></div>
      </div>
      ${barsHTML}
      ${teamGrid}
    </div>`;
}

// ── TAB: GOLES ────────────────────────────────────────────────
function renderGoles({ event:ev, homeStats:hs, awayStats:as, prediction:pred, odds }) {
  if (!hs || !as) return '<div class="no-data">Sin datos suficientes.</div>';

  const hCtx = hs.home_ctx || hs;
  const aCtx = as.away_ctx || as;
  const avgGoals = ((hCtx.avg_total||hs.avg_total||0) + (aCtx.avg_total||as.avg_total||0)) / 2;
  const xgTotal = (pred?.markets?.expected_goals?.home||0) + (pred?.markets?.expected_goals?.away||0);

  const o15 = Math.round(((hCtx.over15_pct||hs.over15_pct||0) + (aCtx.over15_pct||as.over15_pct||0)) / 2);
  const o25 = Math.round(((hCtx.over25_pct||hs.over25_pct||0) + (aCtx.over25_pct||as.over25_pct||0)) / 2);
  const o35 = Math.round(((hCtx.over35_pct||hs.over35_pct||0) + (aCtx.over35_pct||as.over35_pct||0)) / 2);
  const btts = Math.round(((hCtx.btts_pct||hs.btts_pct||0) + (aCtx.btts_pct||as.btts_pct||0)) / 2);

  const recLine = avgGoals > 3 ? '2.5' : avgGoals > 2 ? '2.5' : '1.5';

  const lines = [
    { label:`Over 1.5`, prob:o15, odds: odds?.over15 },
    { label:`Over 2.5`, prob:o25, odds: odds?.over25 },
    { label:`Over 3.5`, prob:o35, odds: null },
    { label:`BTTS (ambos anotan)`, prob:btts, odds: odds?.btts_yes },
  ];

  return `
    <div class="market-card highlighted">
      <div class="mc-header">
        <div class="mc-icon">⚽</div>
        <div><div class="mc-title">Over / Under goles</div>
        <div class="mc-sub">Prom. histórico ${avgGoals.toFixed(1)} goles/partido · xG combinado ${xgTotal.toFixed(2)} · ${ev.home_team} ${hCtx.avg_gf||hs.avg_gf} goles · ${ev.away_team} ${aCtx.avg_gf||as.avg_gf} goles</div></div>
      </div>
      ${lines.map(l => `
        <div class="bar-row">
          <span class="bar-label">${l.label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${l.prob}%;background:${barColor(l.prob)}"></div></div>
          <span class="bar-val">${l.prob}%</span>
          ${l.odds ? `<span style="font-size:11px;color:var(--td);min-width:36px;text-align:right">${l.odds.toFixed(2)}</span>` : ''}
        </div>`).join('')}
      <div class="rec-line">
        <div class="rec-dot"></div>
        <span>Línea recomendada: <b>Over ${recLine}</b> — promedio ${avgGoals.toFixed(1)} goles${xgTotal>0?`, xG ${xgTotal.toFixed(2)}`:''}</span>
      </div>
    </div>`;
}

// ── TAB: PREDICCIÓN ───────────────────────────────────────────
function renderPrediccion({ event:ev, prediction:pred, histStats, homeStats:hs, awayStats:as }) {
  if (!pred) return '<div class="no-data">Sin predicción ML disponible para este partido.</div>';

  const mr  = pred.markets?.match_result || {};
  const eg  = pred.markets?.expected_goals || {};
  const sc  = pred.markets?.score || {};
  const rec = pred.recommendations || {};

  // Resultado más probable
  const winner = rec.favorite === 'H' ? ev.home_team : rec.favorite === 'A' ? ev.away_team : 'Empate';
  const winnerProb = rec.favorite_prob != null ? rec.favorite_prob.toFixed(1) : '—';

  // Marcadores más probables
  const topScores = [];
  if (sc.most_likely) topScores.push({ score: sc.most_likely, label: 'Más probable' });

  // Estimación de corners: promedio histórico del partido
  const cornersEst = histStats?.corners?.avg || null;
  const cardsEst   = histStats?.cards?.avg   || null;
  const offsidesEst= histStats?.offsides?.avg || null;

  // xG
  const xgH = eg.home || null;
  const xgA = eg.away || null;
  const xgTotal = xgH != null && xgA != null ? (xgH + xgA).toFixed(2) : null;

  return `
    <div class="pred-banner">
      <div style="font-size:11px;color:var(--tm);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Resultado más probable</div>
      <div class="pred-result">${winner}</div>
      <div class="pred-sub">Probabilidad ${winnerProb}% · Modelo ${pred.model?.version||''} · Confianza ${Math.round((pred.model?.confidence||0)*100)}%</div>
      ${topScores.length ? `
        <div class="pred-scores">
          ${topScores.map(s => `
            <div class="pred-score-box">
              <div class="psb-score">${s.score}</div>
              <div class="psb-prob">${s.label}</div>
            </div>`).join('')}
        </div>` : ''}
    </div>

    <div class="pred-numbers">
      <div class="pn-box">
        <div class="pn-label">Goles esperados</div>
        <div class="pn-val">${xgTotal || '—'}</div>
        <div class="pn-unit">total xG</div>
        ${xgH!=null?`<div class="pn-range">${ev.home_team.split(' ')[0]} ${xgH.toFixed(2)} · ${ev.away_team.split(' ')[0]} ${xgA.toFixed(2)}</div>`:''}
      </div>
      <div class="pn-box">
        <div class="pn-label">Corners esperados</div>
        <div class="pn-val">${cornersEst != null ? cornersEst.toFixed(1) : '—'}</div>
        <div class="pn-unit">corners estimados</div>
        ${cornersEst!=null?`<div class="pn-range">Línea: Over ${histStats.corners.rec_line}</div>`:''}
      </div>
      <div class="pn-box">
        <div class="pn-label">Tarjetas esperadas</div>
        <div class="pn-val">${cardsEst != null ? cardsEst.toFixed(1) : '—'}</div>
        <div class="pn-unit">amarillas estimadas</div>
        ${cardsEst!=null?`<div class="pn-range">Línea: Over ${histStats.cards.rec_line}</div>`:''}
      </div>
    </div>

    <div class="stat-card">
      <div class="sec-title">Probabilidades ML detalladas</div>
      <div class="bar-row">
        <span class="bar-label" style="min-width:130px">${ev.home_team}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${mr.prob_home||0}%;background:var(--blue)"></div></div>
        <span class="bar-val" style="color:var(--blue)">${mr.prob_home?.toFixed(1)||'—'}%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" style="min-width:130px">Empate</span>
        <div class="bar-track"><div class="bar-fill" style="width:${mr.prob_draw||0}%;background:var(--yellow)"></div></div>
        <span class="bar-val" style="color:var(--yellow)">${mr.prob_draw?.toFixed(1)||'—'}%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" style="min-width:130px">${ev.away_team}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${mr.prob_away||0}%;background:var(--purple)"></div></div>
        <span class="bar-val" style="color:var(--purple)">${mr.prob_away?.toFixed(1)||'—'}%</span>
      </div>
      <div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-top:.875rem;font-size:12px">
        ${pred.markets?.over_under?.prob_over_15!=null?`<span style="color:var(--td)">Over 1.5: <b style="color:var(--t)">${pred.markets.over_under.prob_over_15.toFixed(1)}%</b></span>`:''}
        ${pred.markets?.over_under?.prob_over_25!=null?`<span style="color:var(--td)">Over 2.5: <b style="color:var(--t)">${pred.markets.over_under.prob_over_25.toFixed(1)}%</b></span>`:''}

      </div>
    </div>`;
}

// ── TAB: EQUIPOS ──────────────────────────────────────────────
function renderEquipos({ event:ev, homeStats:hs, awayStats:as }) {
  if (!hs && !as) return '<div class="no-data">Sin datos históricos disponibles.</div>';
  function teamCard(stats, name, ctx) {
    if (!stats) return `<div class="stat-card"><div class="sec-title">${name}</div><div class="no-data">Sin datos.</div></div>`;
    const ctxStats = ctx === 'home' ? (stats.home_ctx||stats) : (stats.away_ctx||stats);
    const ctxLabel = ctx === 'home' ? 'Como local' : 'Como visitante';
    const formHTML = stats.form.map(r => `<div class="dot dot-${r}">${r}</div>`).join('');
    const recent = stats.recent.map(g => {
      const res = g.gf > g.ga ? 'W' : g.gf < g.ga ? 'L' : 'D';
      return `<div class="recent-game">
        <div class="rg-res dot-${res}">${res}</div>
        <div class="rg-opp">${g.home?'vs':'@'} ${g.opponent}</div>
        <div class="rg-score">${g.gf}–${g.ga}</div>
        <div class="rg-date">${g.date}</div>
      </div>`;
    }).join('');
    return `
      <div class="stat-card">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:.625rem">${name}</div>
        <div class="form-dots">${formHTML}</div>
        <div style="font-size:10px;color:var(--purple);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.07em">${ctxLabel} (${ctxStats.n||0} partidos)</div>
        <div class="stat-row"><span class="sk">Victorias</span><span style="font-weight:500;color:var(--green)">${ctxStats.win_pct||stats.win_pct}%</span></div>
        <div class="stat-row"><span class="sk">Empates</span><span style="font-weight:500;color:var(--yellow)">${ctxStats.draw_pct||stats.draw_pct}%</span></div>
        <div class="stat-row"><span class="sk">Goles/partido</span><span style="font-weight:500">${ctxStats.avg_gf||stats.avg_gf}</span></div>
        <div class="stat-row"><span class="sk">Goles recibidos/partido</span><span style="font-weight:500">${ctxStats.avg_ga||stats.avg_ga}</span></div>
        <div class="stat-row"><span class="sk">BTTS</span><span style="font-weight:500">${ctxStats.btts_pct||stats.btts_pct}%</span></div>
        <div class="stat-row"><span class="sk">Over 2.5</span><span style="font-weight:500">${ctxStats.over25_pct||stats.over25_pct}%</span></div>
        <div class="stat-row"><span class="sk">Portería a 0</span><span style="font-weight:500">${ctxStats.clean_sheet_pct||stats.clean_sheet_pct}%</span></div>
        <div style="margin-top:.875rem"><div class="sc-title">Últimos partidos</div>${recent}</div>
      </div>`;
  }
  return `<div class="g2">${teamCard(hs, ev.home_team, 'home')}${teamCard(as, ev.away_team, 'away')}</div>`;
}

// ── TAB: H2H ─────────────────────────────────────────────────

      </div>
      <div class="prob-track" style="height:6px;margin-bottom:.875rem">
        <div class="prob-fill" style="width:${Math.round(hW/total*100)}%;background:var(--blue)"></div>

        ${h2h.over_25_pct!=null?`<span style="color:var(--td)">Over 2.5: <b style="color:var(--t)">${Math.round(h2h.over_25_pct*100)}%</b></span>`:''}

    </div>`;

// ── TAB: ALINEACIONES ─────────────────────────────────────────
function renderAlineacion({ event:ev, lineups }) {
  if (!lineups || lineups.lineup_status === 'unavailable' || !lineups.lineups)
    return '<div class="no-data">Alineaciones no disponibles aún.</div>';
  const home = lineups.lineups?.home, away = lineups.lineups?.away;
  const sl = {confirmed:'✅ Confirmada', predicted:'🤖 Predicha IA'}[lineups.lineup_status]||lineups.lineup_status;
  function pl(side) {
    const players = side?.players||[];
    if (!players.length) return '<div class="no-data">Sin datos</div>';
    return players.map(p => `
      <div class="player-row">
        <span class="p-num">${p.jersey_number||''}</span>
        <span class="p-name">${p.name}</span>
        <span class="p-pos">${p.position}</span>
        ${p.ai_score?`<span class="p-score">${(p.ai_score*100).toFixed(0)}</span>`:''}
      </div>`).join('');
  }
  const unavH = lineups.unavailable_players?.home||[];
  const unavA = lineups.unavailable_players?.away||[];
  return `
    <div class="g2">
      <div class="stat-card">
        <div class="sec-title">${ev.home_team} — ${sl}</div>
        ${home?.formation?`<div style="font-size:12px;color:var(--tm);margin-bottom:.5rem">Formación: <b>${home.formation}</b></div>`:''}
        ${pl(home)}
        ${unavH.length?`<div style="margin-top:.75rem"><div style="font-size:11px;color:var(--red);margin-bottom:4px">Bajas</div>${unavH.map(p=>`<div style="font-size:12px;color:var(--td);padding:2px 0">❌ ${p.name} — ${p.reason}</div>`).join('')}</div>`:''}
      </div>
      <div class="stat-card">
        <div class="sec-title">${ev.away_team} — ${sl}</div>
        ${away?.formation?`<div style="font-size:12px;color:var(--tm);margin-bottom:.5rem">Formación: <b>${away.formation}</b></div>`:''}
        ${pl(away)}
        ${unavA.length?`<div style="margin-top:.75rem"><div style="font-size:11px;color:var(--red);margin-bottom:4px">Bajas</div>${unavA.map(p=>`<div style="font-size:12px;color:var(--td);padding:2px 0">❌ ${p.name} — ${p.reason}</div>`).join('')}</div>`:''}
      </div>
    </div>`;
}

loadEvents();
</script>
</body>
</html>
