<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Pro — Análisis de Apuestas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
:root{
  --bg:#090b10;--s1:#111318;--s2:#181c24;--s3:#1e2330;
  --bd:rgba(255,255,255,.07);--bds:rgba(255,255,255,.14);--bdx:rgba(255,255,255,.22);
  --t:#e2e6f0;--tm:#8892aa;--td:#454f68;
  --green:#3ddc84;--green-dim:rgba(61,220,132,.12);
  --yellow:#f5b731;--yellow-dim:rgba(245,183,49,.1);
  --red:#ff5f5f;--red-dim:rgba(255,95,95,.1);
  --blue:#4d9cff;--blue-dim:rgba(77,156,255,.1);
  --purple:#9d7cff;--purple-dim:rgba(157,124,255,.1);
  --orange:#ff8c42;
  --r:10px;--rl:14px;--rxl:18px;
  --sidebar:320px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ══════════════════════════════════
   SCREEN 1 — MATCH LIST
══════════════════════════════════ */
#screen-list{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:.5px solid var(--bd)}
.app-logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.app-logo span{color:var(--green)}
.app-tagline{font-size:12px;color:var(--tm)}
.app-date{font-size:13px;color:var(--td);text-align:right}

.day-header{display:flex;align-items:center;gap:10px;margin-bottom:.875rem}
.day-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:#fff}
.day-line{flex:1;height:.5px;background:var(--bd)}
.day-badge{font-size:11px;color:var(--td);background:var(--s2);padding:3px 10px;border-radius:20px;border:.5px solid var(--bd)}

/* ── Match card ── */
.matches-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.75rem}
.match-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:.875rem 1.25rem;cursor:pointer;transition:border-color .15s,background .12s;display:grid;grid-template-columns:1fr auto;gap:.75rem;align-items:center}
.match-card:hover{background:var(--s2);border-color:var(--bds)}
.mc-left{}
.mc-league{font-size:11px;color:var(--tm);margin-bottom:.375rem;display:flex;align-items:center;gap:5px}
.mc-league-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0}
.mc-teams{font-size:15px;font-weight:500;color:#fff;margin-bottom:.375rem}
.mc-teams .sep{color:var(--td);font-size:12px;font-weight:400;margin:0 6px}
.mc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mc-time{font-size:12px;color:var(--tm)}
.mc-live{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--red);font-weight:500}
.mc-live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
.mc-score{font-size:13px;font-weight:600;color:var(--t)}
.mc-group{font-size:11px;color:var(--td);background:var(--s2);padding:2px 8px;border-radius:20px;border:.5px solid var(--bd)}
.mc-right{text-align:right}
.mc-odds{display:flex;gap:5px}
.odd-chip{background:var(--s2);border:.5px solid var(--bd);border-radius:6px;padding:4px 8px;text-align:center;min-width:44px}
.odd-chip .ol{font-size:9px;color:var(--td);text-transform:uppercase;margin-bottom:1px}
.odd-chip .ov{font-size:13px;font-weight:500;color:var(--t)}
.conf-badge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-top:6px;justify-content:flex-end}
.conf-hi  {background:var(--green-dim);color:var(--green)}
.conf-med {background:var(--yellow-dim);color:var(--yellow)}
.conf-lo  {background:var(--red-dim);color:var(--red)}

/* ── Skeleton ── */
.skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-card{height:72px;margin-bottom:6px}
.sk-line{height:14px;border-radius:6px;margin-bottom:6px}

/* ══════════════════════════════════
   SCREEN 2 — MATCH DETAIL
══════════════════════════════════ */
#screen-detail{max-width:1000px;margin:0 auto;padding:1.25rem 1.25rem 5rem}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--tm);cursor:pointer;padding:6px 0;margin-bottom:1.25rem;transition:color .15s}
.back-btn:hover{color:var(--t)}
.back-btn svg{width:16px;height:16px}

/* ── Match hero ── */
.match-hero{background:linear-gradient(135deg,var(--s1) 0%,var(--s2) 100%);border:.5px solid var(--bd);border-radius:var(--rxl);padding:1.75rem 2rem;margin-bottom:1rem}
.hero-league{font-size:12px;color:var(--tm);margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.hero-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;margin-bottom:1.25rem}
.hero-team{text-align:center}
.hero-team-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:3px}
.hero-team-sub{font-size:12px;color:var(--tm)}
.hero-center{text-align:center}
.hero-score{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1}
.hero-time-str{font-size:22px;color:var(--td)}
.hero-status{margin-top:6px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.sp-live{background:var(--red-dim);color:var(--red)}
.sp-ns  {background:var(--blue-dim);color:var(--blue)}
.sp-fin {background:var(--green-dim);color:var(--green)}

.hero-odds{display:flex;gap:8px;margin-top:1rem;justify-content:center}
.hero-odd{flex:1;max-width:120px;background:rgba(255,255,255,.04);border:.5px solid var(--bd);border-radius:var(--r);padding:.625rem;text-align:center}
.hero-odd .ho-label{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-odd .ho-val{font-size:17px;font-weight:500;color:#fff}
.hero-odd .ho-prob{font-size:11px;color:var(--td);margin-top:1px}

/* ── Meta bar ── */
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.meta-chip{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--r);padding:.625rem 1rem;flex:1;min-width:100px;text-align:center}
.meta-chip .mc-lbl{font-size:11px;color:var(--tm);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.meta-chip .mc-val{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700}

/* ── Tabs ── */
.tabs-bar{display:flex;gap:2px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tm);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab-btn:hover{color:var(--t);background:var(--s2)}
.tab-btn.active{background:var(--s2);color:#fff;border:.5px solid var(--bds)}

/* ── Tab content ── */
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── Section title ── */
.sec-hdr{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--td);font-weight:600;margin-bottom:.75rem}

/* ── Cards ── */
.card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1.125rem 1.375rem;margin-bottom:.75rem}
.card.highlight{border-color:rgba(61,220,132,.25);background:rgba(61,220,132,.03)}

/* ── Probability bars ── */
.prob-row{display:flex;align-items:center;gap:10px;margin-bottom:.625rem;font-size:14px}
.prob-label{flex:0 0 140px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.prob-track{flex:1;height:6px;background:var(--s2);border-radius:99px;overflow:hidden}
.prob-fill{height:100%;border-radius:99px;transition:width .5s ease}
.prob-val{flex:0 0 40px;text-align:right;font-weight:600;font-size:14px}

/* ── 3-col result ── */
.result-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:.875rem}
.r3-box{background:var(--s2);border-radius:var(--rl);padding:1rem;text-align:center}
.r3-label{font-size:11px;color:var(--tm);margin-bottom:6px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r3-prob{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1}
.r3-bar{height:4px;border-radius:99px;margin-top:6px}
.r3-sub{font-size:11px;color:var(--td);margin-top:4px}

/* ── Score table ── */
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:.875rem}
.score-box{background:var(--s2);border-radius:var(--r);padding:.75rem .5rem;text-align:center;position:relative}
.score-box.top1{border:.5px solid rgba(61,220,132,.4);background:rgba(61,220,132,.08)}
.score-box.top2{border:.5px solid rgba(245,183,49,.3);background:rgba(245,183,49,.06)}
.score-box.top3{border:.5px solid rgba(77,156,255,.3);background:rgba(77,156,255,.06)}
.sb-score{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.sb-prob{font-size:13px;color:var(--tm)}
.sb-rank{position:absolute;top:5px;right:7px;font-size:9px;color:var(--td)}

/* ── Value bets ── */
.bet-row{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.625rem}
.bet-row.value{border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.03)}
.br-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:.625rem}
.br-market{font-size:15px;font-weight:500;color:#fff;flex:1}
.br-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px}
.br-right{text-align:right;flex-shrink:0}
.br-prob{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}
.br-impl{font-size:11px;color:var(--td);margin-top:1px}
.br-bottom{display:flex;gap:.875rem;flex-wrap:wrap;font-size:12px;color:var(--tm);padding-top:.5rem;border-top:.5px solid var(--bd)}
.br-bottom b{color:var(--t)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.badge-val{background:var(--green-dim);color:var(--green)}
.badge-odds{background:var(--s2);color:var(--tm)}
.badge-neu{background:var(--s3);color:var(--td)}

/* ── Factors ── */
.factors{display:flex;gap:.75rem;margin-top:.625rem;flex-wrap:wrap}
.factor-group{flex:1;min-width:140px}
.factor-group .fg-title{font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-weight:600}
.fg-title.favor{color:var(--green)}
.fg-title.contra{color:var(--red)}
.factor-item{font-size:12px;color:var(--tm);padding:2px 0;display:flex;align-items:center;gap:5px}
.factor-item::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.favor .factor-item::before{background:var(--green)}
.contra .factor-item::before{background:var(--red)}

/* ── Stats grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
@media(max-width:580px){.g2{grid-template-columns:1fr}}

.team-stat-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem 1.25rem}
.tsc-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:.125rem}
.tsc-ctx{font-size:11px;color:var(--purple);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.06em}

.form-dots{display:flex;gap:4px;margin-bottom:.875rem}
.fd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.fd-W{background:rgba(61,220,132,.18);color:var(--green)}
.fd-D{background:rgba(245,183,49,.14);color:var(--yellow)}
.fd-L{background:rgba(255,95,95,.14);color:var(--red)}

.stat-line{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--bd);font-size:14px}
.stat-line:last-child{border-bottom:none}
.stat-line .sk{color:var(--tm)}
.stat-line .sv{font-weight:500}

.recent-list{margin-top:.875rem}
.rl-title{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.recent-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.recent-item:last-child{border-bottom:none}
.ri-res{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ri-opp{flex:1;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-score{font-weight:500}
.ri-date{font-size:11px;color:var(--td);min-width:50px;text-align:right}

/* ── H2H ── */
.h2h-visual{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;text-align:center;margin-bottom:.875rem;align-items:center}
.h2h-num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}
.h2h-lbl{font-size:11px;color:var(--td);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.h2h-bar{height:6px;border-radius:99px;overflow:hidden;display:flex;margin-bottom:.875rem}
.h2h-seg{height:100%;border-radius:0}

/* ── Corners/cards/offsides ── */
.ou-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:1.125rem 1.375rem;margin-bottom:.75rem}
.ou-header{display:flex;align-items:center;gap:10px;margin-bottom:.875rem}
.ou-icon{width:36px;height:36px;border-radius:var(--r);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ou-title{font-size:15px;font-weight:500;color:#fff}
.ou-sub{font-size:12px;color:var(--tm);margin-top:2px}
.ou-rec{display:flex;align-items:center;gap:8px;background:var(--green-dim);border:.5px solid rgba(61,220,132,.2);border-radius:var(--r);padding:8px 12px;margin-top:.75rem;font-size:13px;color:var(--t)}

/* ── Poisson info ── */
.poisson-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.875rem}
.pc{background:var(--s2);border-radius:var(--r);padding:8px 12px;text-align:center;min-width:80px}
.pc-label{font-size:10px;color:var(--td);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.pc-val{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff}

/* ── Trap reasons ── */
.trap-list{display:flex;flex-direction:column;gap:5px;margin-top:.5rem}
.trap-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--tm)}
.trap-item::before{content:'⚠️';font-size:12px;flex-shrink:0}

/* ── Lineup ── */
.lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.player-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:13px}
.player-item:last-child{border-bottom:none}
.pi-num{font-size:11px;color:var(--td);min-width:22px}
.pi-name{flex:1;color:var(--t)}
.pi-pos{font-size:10px;color:var(--tm);background:var(--s2);padding:2px 7px;border-radius:20px}
.pi-score{font-size:11px;color:var(--td)}

/* ── Ensemble debug ── */
.ensemble-sources{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.875rem}
.es-box{background:var(--s2);border-radius:var(--r);padding:.875rem;text-align:center}
.es-label{font-size:11px;color:var(--tm);margin-bottom:.5rem;font-weight:500}
.es-weight{font-size:10px;color:var(--td);margin-top:4px}

/* ── Faves ── */
.fav-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px;color:var(--td);transition:color .15s}
.fav-btn.active{color:var(--yellow)}

/* ── Loading ── */
.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:.75rem;color:var(--tm);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.no-data{color:var(--td);font-size:13px;font-style:italic;padding:.75rem 0}
.err-box{background:var(--red-dim);border:.5px solid rgba(255,95,95,.2);border-radius:var(--r);padding:.875rem 1.25rem;color:var(--red);font-size:13px}

/* ── Player threat cards ── */
.player-threat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.875rem}
.pt-card{background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:.875rem 1.25rem;display:flex;align-items:center;gap:12px}
.pt-card.top{border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.03)}
.pt-rank{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700;color:var(--td);min-width:28px;text-align:center}
.pt-rank.r1{color:var(--yellow)}
.pt-rank.r2{color:var(--tm)}
.pt-rank.r3{color:var(--orange)}
.pt-info{flex:1;min-width:0}
.pt-name{font-size:15px;font-weight:500;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-meta{font-size:12px;color:var(--tm)}
.pt-bars{flex:0 0 180px}
.pt-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px}
.pt-bar-label{min-width:28px;color:var(--td);text-align:right}
.pt-bar-track{flex:1;height:4px;background:var(--s2);border-radius:99px;overflow:hidden}
.pt-bar-fill{height:100%;border-radius:99px}
.pt-prob{text-align:right;flex-shrink:0}
.pt-prob-val{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:700}
.pt-prob-lbl{font-size:10px;color:var(--td)}
</style>
</head>
<body>

<!-- SCREEN 1: LIST -->
<div id="screen-list" class="view active">
  <div class="app-header">
    <div>
      <div class="app-logo">⚽ Scout<span>Pro</span></div>
      <div class="app-tagline">Motor cuantitativo de análisis de apuestas</div>
    </div>
    <div class="app-date" id="appDate"></div>
  </div>
  <div id="listContent">
    <div class="day-header"><div class="day-title">Cargando partidos…</div></div>
    <div class="matches-list">${[1,2,3,4,5].map(()=>`<div class="skeleton sk-card"></div>`).join('')}</div>
  </div>
</div>

<!-- SCREEN 2: DETAIL -->
<div id="screen-detail" class="view">
  <div class="back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Volver a partidos
  </div>
  <div id="detailContent">
    <div class="loading-overlay"><div class="spin"></div>Analizando partido…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const state = {
  events: null,
  scrollY: 0,
  currentTab: 'resumen',
  favorites: JSON.parse(localStorage.getItem('scout_favs') || '[]'),
  matchCache: {},
};

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit', timeZone:'America/Panama' });
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', timeZone:'America/Panama' });
}
function pCol(p) { return p >= 60 ? 'var(--green)' : p >= 40 ? 'var(--yellow)' : 'var(--red)'; }
function bCol(p) { return p >= 65 ? '#3ddc84' : p >= 45 ? '#f5b731' : '#ff5f5f'; }
function n1(v) { return v != null ? +v : null; }

document.getElementById('appDate').textContent = new Date().toLocaleDateString('es', {
  weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone:'America/Panama'
});

function showScreen(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function goToMatch(id) {
  state.scrollY = window.scrollY;
  window.location.hash = '#/match/' + id;
}

function goBack() {
  window.location.hash = '#/';
  showScreen('list');
  requestAnimationFrame(() => window.scrollTo(0, state.scrollY));
}

function handleHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#/match/')) {
    const id = parseInt(hash.replace('#/match/', ''));
    showScreen('detail');
    loadMatch(id);
  } else {
    showScreen('list');
  }
}

window.addEventListener('hashchange', handleHash);
window.addEventListener('popstate', handleHash);

// SCREEN 1 — EVENTS

// ── Date navigator ────────────────────────────────
function panamaToday() {
  const d = new Date(Date.now() - 5 * 60 * 60 * 1000);
  return d.toISOString().split('T')[0];
}

state.currentDate = state.currentDate || panamaToday();
const MAX_DAYS_AHEAD = 3;

function dateLabel(dateStr) {
  const today = panamaToday();
  const diff = Math.round((new Date(dateStr) - new Date(today)) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long' });
}

function offsetDate(base, days) {
  const d = new Date(base + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function renderDateNav(dateStr) {
  const today = panamaToday();
  const diff  = Math.round((new Date(dateStr) - new Date(today)) / 86400000);
  const canPrev = diff > 0;
  const canNext = diff < MAX_DAYS_AHEAD;
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;background:var(--s1);border:.5px solid var(--bd);border-radius:var(--rl);padding:.75rem 1.25rem">
      <button onclick="changeDate(-1)" style="background:none;border:none;cursor:${canPrev?'pointer':'default'};font-size:22px;color:${canPrev?'var(--t)':'var(--td)'};padding:4px 10px;border-radius:var(--r)" ${canPrev?'':'disabled'}>‹</button>
      <div style="text-align:center">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff">${dateLabel(dateStr)}</div>
        <div style="font-size:12px;color:var(--tm);margin-top:2px">${dateStr}</div>
      </div>
      <button onclick="changeDate(1)" style="background:none;border:none;cursor:${canNext?'pointer':'default'};font-size:22px;color:${canNext?'var(--t)':'var(--td)'};padding:4px 10px;border-radius:var(--r)" ${canNext?'':'disabled'}>›</button>
    </div>`;
}

function changeDate(delta) {
  const today = panamaToday();
  const diff  = Math.round((new Date(state.currentDate) - new Date(today)) / 86400000);
  const newDiff = diff + delta;
  if (newDiff < 0 || newDiff > MAX_DAYS_AHEAD) return;
  state.currentDate = offsetDate(today, newDiff);
  loadEvents();
}

async function loadEvents() {
  const dateStr = state.currentDate;
  const listContent = document.getElementById('listContent');
  listContent.innerHTML = renderDateNav(dateStr) +
    '<div class="matches-list">' + [1,2,3,4,5].map(() => '<div class="skeleton sk-card"></div>').join('') + '</div>';
  try {
    const r = await fetch('/api/today?date=' + dateStr);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderList(data, dateStr);
  } catch(e) {
    listContent.innerHTML = renderDateNav(dateStr) + `<div class="err-box">❌ ${e.message}</div>`;
  }
}

function renderList({ events=[] }, dateStr) {
  const nav = renderDateNav(dateStr);
  if (!events.length) {
    document.getElementById('listContent').innerHTML = nav + '<div class="no-data" style="padding:2rem 0;text-align:center">No hay partidos para este día.</div>';
    return;
  }
  const html = nav +
    `<div class="day-header"><div class="day-title">${dateLabel(dateStr)}</div><div class="day-line"></div><div class="day-badge">${events.length} partidos</div></div>` +
    '<div class="matches-list">' + events.map(matchCard).join('') + '</div>';
  document.getElementById('listContent').innerHTML = html;
}


function matchCard(e) {
  const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(e.status);
  const isFin  = e.status === 'finished';
  const timeStr = isFin ? `Final: ${e.home_score}–${e.away_score}` : isLive ? '' : fmtTime(e.event_date);
  const isFav = state.favorites.includes(e.id);

  // Try to get cached confidence
  const cached = state.matchCache[e.id];
  const confHtml = cached ? confBadge(cached.meta?.confidence) : '';

  return `
    <div class="match-card" onclick="goToMatch(${e.id})">
      <div class="mc-left">
        <div class="mc-league"><div class="mc-league-dot"></div>${e.group_name || 'Partido'}</div>
        <div class="mc-teams">${e.home_team} <span class="sep">vs</span> ${e.away_team}</div>
        <div class="mc-meta">
          ${isLive ? `<div class="mc-live"><div class="mc-live-dot"></div> EN VIVO ${e.current_minute?e.current_minute+"'":''}</div>` : ''}
          ${isLive && e.home_score != null ? `<div class="mc-score">${e.home_score}–${e.away_score}</div>` : ''}
          ${!isLive ? `<div class="mc-time">${timeStr}</div>` : ''}
          ${e.round_name ? `<div class="mc-group">${e.round_name}</div>` : ''}
        </div>
      </div>
      <div class="mc-right">
        <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,${e.id})" title="Favorito">${isFav?'★':'☆'}</button>
        ${confHtml}
      </div>
    </div>`;
}

function confBadge(score) {
  if (score == null) return '';
  const cls = score >= 70 ? 'conf-hi' : score >= 50 ? 'conf-med' : 'conf-lo';
  return `<div class="conf-badge ${cls}">◉ ${score}/100</div>`;
}

function toggleFav(event, id) {
  event.stopPropagation();
  const idx = state.favorites.indexOf(id);
  if (idx > -1) state.favorites.splice(idx, 1);
  else state.favorites.push(id);
  localStorage.setItem('scout_favs', JSON.stringify(state.favorites));
  loadEvents(); // re-render
}

// ══════════════════════════════════════════════════
// SCREEN 2 — DETAIL
// ══════════════════════════════════════════════════
async function loadMatch(id) {
  const content = document.getElementById('detailContent');
  if (state.matchCache[id]) {
    renderDetail(state.matchCache[id]);
    return;
  }
  content.innerHTML = '<div class="loading-overlay"><div class="spin"></div>Calculando Poisson, ensemble y análisis de valor…</div>';
  try {
    const r = await fetch('/api/analyze?id=' + id);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    state.matchCache[id] = data;
    renderDetail(data);
  } catch(e) {
    content.innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }
}

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
}

function renderDetail(d) {
  const { event:ev, homeStats:hs, awayStats:as, odds, prediction:pred, h2h, lineups, histStats, poisson, ensemble, bets, meta } = d;

  const tabs = [
    { id:'resumen',    label:'📊 Resumen' },
    { id:'scores',     label:'🎯 Marcadores' },
    { id:'goles',      label:'⚽ Goles' },
    { id:'corners',    label:'🚩 Corners' },
    { id:'tarjetas',   label:'🟨 Tarjetas' },
    { id:'offsides',   label:'🚦 Fueras' },
    { id:'valor',      label:'💰 Value Bets' },
    { id:'equipos',    label:'📈 Equipos' },
    { id:'alineacion', label:'👥 Alineaciones' },
    { id:'h2h',        label:'🔍 H2H' },
    { id:'riesgos',    label:'🚨 Riesgos' },
    { id:'jugadores',  label:'⚽ Goleadores' },
  ];

  const tabsHTML = tabs.map(t =>
    `<button class="tab-btn ${t.id===state.currentTab?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');

  document.getElementById('detailContent').innerHTML = `
    ${renderHero(ev, odds, meta)}
    ${renderMetaRow(meta)}
    <div class="tabs-bar">${tabsHTML}</div>
    ${tabs.map(t => `<div class="tab-pane ${t.id===state.currentTab?'active':''}" id="tab-${t.id}">${renderTab(t.id, d)}</div>`).join('')}
  `;
}

function renderTab(id, d) {
  switch(id) {
    case 'resumen':    return tabResumen(d);
    case 'scores':     return tabScores(d);
    case 'goles':      return tabGoles(d);
    case 'corners':    return tabOU('corners', d);
    case 'tarjetas':   return tabOU('cards', d);
    case 'offsides':   return tabOU('offsides', d);
    case 'valor':      return tabValor(d);
    case 'equipos':    return tabEquipos(d);
    case 'alineacion': return tabAlineacion(d);
    case 'h2h':        return tabH2H(d);
    case 'riesgos':    return tabRiesgos(d);
    case 'jugadores':  return tabJugadores(d);
    default: return '';
  }
}

// ── HERO ──────────────────────────────────────────
function renderHero(ev, odds, meta) {
  const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(ev.status);
  const isFin  = ev.status === 'finished';
  const isNS   = ev.status === 'notstarted';

  const scoreHTML = isNS
    ? `<div class="hero-time-str">${fmtTime(ev.event_date)}</div>`
    : `<div class="hero-score">${ev.home_score || 0} <span style="color:var(--td);font-size:28px">–</span> ${ev.away_score || 0}</div>`;

  const statusLabel = {notstarted:'Por jugar',finished:'Finalizado','1st_half':'1ª Parte','2nd_half':'2ª Parte',halftime:'Descanso',inprogress:'En Juego',postponed:'Aplazado'}[ev.status]||ev.status;
  const sClass = isLive?'sp-live':isFin?'sp-fin':'sp-ns';

  const haVal = meta?.home_advantage;
  const haText = haVal != null ? (haVal >= 7 ? '🏠 Ventaja local alta' : haVal >= 4 ? '🏠 Ventaja local moderada' : haVal >= 2 ? '🏠 Ventaja mínima' : '⚖️ Sin ventaja local') : '';

  const oddsHTML = (odds.home || odds.draw || odds.away) ? `
    <div class="hero-odds">
      ${odds.home ? `<div class="hero-odd"><div class="ho-label">${ev.home_team.split(' ')[0]}</div><div class="ho-val">${odds.home.toFixed(2)}</div><div class="ho-prob">${(1/odds.home*100).toFixed(0)}%</div></div>` : ''}
      ${odds.draw ? `<div class="hero-odd"><div class="ho-label">Empate</div><div class="ho-val">${odds.draw.toFixed(2)}</div><div class="ho-prob">${(1/odds.draw*100).toFixed(0)}%</div></div>` : ''}
      ${odds.away ? `<div class="hero-odd"><div class="ho-label">${ev.away_team.split(' ')[0]}</div><div class="ho-val">${odds.away.toFixed(2)}</div><div class="ho-prob">${(1/odds.away*100).toFixed(0)}%</div></div>` : ''}
    </div>` : '';

  return `
    <div class="match-hero">
      <div class="hero-league">⚽ ${ev.group_name || ''} ${ev.round_name || ''} &nbsp;·&nbsp; ${fmtDate(ev.event_date)}</div>
      <div class="hero-teams">
        <div class="hero-team"><div class="hero-team-name">${ev.home_team}</div><div class="hero-team-sub">Local</div></div>
        <div class="hero-center">
          ${scoreHTML}
          <div class="hero-status"><span class="status-pill ${sClass}">${statusLabel}${isLive&&ev.current_minute?' · '+ev.current_minute+"'":''}
          </span></div>
          ${haText ? `<div style="font-size:11px;color:var(--tm);margin-top:6px">${haText}</div>` : ''}
        </div>
        <div class="hero-team"><div class="hero-team-name">${ev.away_team}</div><div class="hero-team-sub">Visitante</div></div>
      </div>
      ${oddsHTML}
    </div>`;
}

// ── META ROW ──────────────────────────────────────
function renderMetaRow(meta) {
  if (!meta) return '';
  const cc = meta.confidence >= 70 ? 'var(--green)' : meta.confidence >= 50 ? 'var(--yellow)' : 'var(--red)';
  const tc = meta.trap <= 3 ? 'var(--green)' : meta.trap <= 5 ? 'var(--yellow)' : 'var(--red)';
  const haLabel = meta.home_advantage != null ? meta.home_advantage + '/10' : '—';
  const ls = {confirmed:'✅ Oficial',predicted:'🤖 IA',unavailable:'❓'}[meta.lineup_status]||'—';
  return `
    <div class="meta-row">
      <div class="meta-chip"><div class="mc-lbl">Confianza</div><div class="mc-val" style="color:${cc}">${meta.confidence}</div></div>
      <div class="meta-chip"><div class="mc-lbl">Trap Score</div><div class="mc-val" style="color:${tc}">${meta.trap}/10</div></div>
      <div class="meta-chip"><div class="mc-lbl">Ventaja local</div><div class="mc-val">${haLabel}</div></div>
      <div class="meta-chip"><div class="mc-lbl">Modelo ML</div><div class="mc-val">${Math.round((meta.model_confidence||0)*100)}%</div></div>
      <div class="meta-chip"><div class="mc-lbl">Alineación</div><div class="mc-val" style="font-size:13px;padding-top:4px">${ls}</div></div>
    </div>`;
}

      <div class="r3-box">
        <div class="r3-label">Empate</div>

        <div class="r3-sub">Poisson ${poisson.draw}%</div>
      </div>
      <div class="r3-box">
        <div class="r3-label">${ev.away_team}</div>

        <div class="r3-bar" style="background:linear-gradient(90deg,var(--purple) ${eA}%,var(--s2) 0%)"></div>
        <div class="r3-sub">Poisson ${poisson.away_win}%</div>

  // Ensemble sources breakdown

  const sourcesHTML = `
    <div class="card" style="margin-bottom:.75rem">
      <div class="sec-hdr">Ensemble — fuentes y pesos</div>
      <div class="ensemble-sources">
        <div class="es-box">
          <div class="es-label">🎯 Poisson</div>
          <div style="font-size:13px;color:var(--t)">${src.poisson.h}% / ${src.poisson.d}% / ${src.poisson.a}%</div>
          <div class="es-weight">Peso: ${src.poisson.weight}%</div>
        </div>
        <div class="es-box">
          <div class="es-label">🤖 ML API</div>
          <div style="font-size:13px;color:var(--t)">${src.ml.h}% / ${src.ml.d}% / ${src.ml.a}%</div>
          <div class="es-weight">Peso: ${src.ml.weight}%</div>
        </div>
        <div class="es-box">
          <div class="es-label">📋 Forma</div>
          <div style="font-size:13px;color:var(--t)">${src.form.h}% / ${src.form.d}% / ${src.form.a}%</div>
          <div class="es-weight">Peso: ${src.form.weight}%</div>
        </div>
      </div>

  // xG and lambdas

// ── TAB: GOLES ────────────────────────────────────
function tabGoles({ event:ev, poisson, prediction:pred, homeStats:hs, awayStats:as, odds }) {
  if (!poisson) return '<div class="no-data">Sin datos disponibles.</div>';

  const o15 = poisson.over15;
  const o25 = poisson.over25;
  const o35 = poisson.over35;
  const bt  = poisson.btts;

  const lines = [
    { label:'Over 1.5 goles', prob:o15, odds: odds.over15, color:'var(--green)' },
    { label:'Over 2.5 goles', prob:o25, odds: odds.over25, color:'var(--yellow)' },
    { label:'Over 3.5 goles', prob:o35, odds: null,        color:'var(--orange)' },
    { label:'Under 2.5 goles', prob:Math.round(100-o25), odds: odds.under25, color:'var(--blue)' },

  const barsHTML = lines.map(l => `
    <div class="prob-row">
      <span class="prob-label">${l.label}</span>

}

// ── TAB: CORNERS / TARJETAS / OFFSIDES ───────────

    <div class="prob-row">
      <span class="prob-label">Over ${l.line}</span>
      <div class="prob-track"><div class="prob-fill" style="width:${l.over_pct}%;background:${bCol(l.over_pct)}"></div></div>

  return `
    <div class="ou-card">
      <div class="ou-header">
        <div class="ou-icon">${icons[type]}</div>
        <div>
          <div class="ou-title">${titles[type]}</div>
          <div class="ou-sub">Promedio histórico combinado: ${avg} ${labels[type]}/partido · Basado en ${histStats.matches} partidos</div>
        </div>
      </div>
      ${barsHTML}
      <div class="ou-rec">
        <span style="font-size:16px">✅</span>
        Línea recomendada: <b>Over ${combined.rec_line}</b> — promedio ${avg} ${labels[type]}
      </div>
    </div>`;
}

// ── TAB: VALUE BETS ───────────────────────────────
function tabValor({ bets, event:ev }) {
  if (!bets?.length) return '<div class="no-data">Sin apuestas calculadas.</div>';

  const valueBets = bets.filter(b => b.hasValue);
  const rest = bets.filter(b => !b.hasValue);

  function betCard(b) {
    const pColor = pCol(b.prob);
    const evColor = b.ev > 0 ? 'var(--green)' : 'var(--red)';
    const factorsHTML = (b.factors?.favor?.length || b.factors?.contra?.length) ? `
      <div class="factors">
        ${b.factors?.favor?.length ? `<div class="factor-group favor"><div class="fg-title favor">A favor</div>${b.factors.favor.map(f=>`<div class="factor-item">${f}</div>`).join('')}</div>` : ''}
        ${b.factors?.contra?.length ? `<div class="factor-group contra"><div class="fg-title contra">En contra</div>${b.factors.contra.map(f=>`<div class="factor-item">${f}</div>`).join('')}</div>` : ''}
      </div>` : '';

    return `
      <div class="bet-row ${b.hasValue?'value':''}">
        <div class="br-top">
          <div style="flex:1">
            <div class="br-market">${b.market}</div>
            <div class="br-badges">
              ${b.hasValue ? `<span class="badge badge-val">✓ Value</span>` : ''}
              ${b.odds ? `<span class="badge badge-odds">${b.odds.toFixed(2)}</span>` : '<span class="badge badge-neu">Sin cuota</span>'}
            </div>
            <div style="font-size:12px;color:var(--tm);margin-top:4px">${b.reason}</div>
            ${factorsHTML}
          </div>
          <div class="br-right">
            <div class="br-prob" style="color:${pColor}">${b.prob}%</div>
            ${b.impliedProb ? `<div class="br-impl">Impl.: ${b.impliedProb}%</div>` : ''}
          </div>
        </div>
        ${b.ev != null ? `<div class="br-bottom">
          <span>Edge: <b style="color:${b.edge>0?'var(--green)':'var(--red)'}">${b.edge>0?'+':''}${b.edge}%</b></span>
          <span>EV: <b style="color:${evColor}">${b.ev>0?'+':''}${b.ev}</b></span>
          ${b.odds?`<span>Cuota: <b>${b.odds.toFixed(2)}</b></span>`:''}
        </div>` : ''}
      </div>`;
  }

  let html = '';
  if (valueBets.length) {
    html += `<div class="sec-hdr">✅ Value bets detectadas (edge > 3%)</div>`;
    html += valueBets.map(betCard).join('');
  }
  if (rest.length) {
    html += `<div class="sec-hdr" style="margin-top:${valueBets.length?'1.25rem':'0'}">Todas las predicciones</div>`;
    html += rest.map(betCard).join('');
  }
  if (!valueBets.length && rest.length) {
    html = `<div style="background:var(--yellow-dim);border:.5px solid rgba(245,183,49,.2);border-radius:var(--r);padding:.875rem 1.25rem;color:var(--yellow);font-size:13px;margin-bottom:1rem">⚠️ Sin value bets detectadas (sin cuotas disponibles o edge insuficiente)</div>` + html;
  }
  return html;
}

// ── TAB: EQUIPOS ──────────────────────────────────
function tabEquipos({ event:ev, homeStats:hs, awayStats:as }) {
  if (!hs && !as) return '<div class="no-data">Sin datos disponibles.</div>';

  function teamCard(stats, name, ctx) {
    if (!stats) return `<div class="team-stat-card"><div class="tsc-name">${name}</div><div class="no-data">Sin datos.</div></div>`;
    const ctxSt = ctx === 'home' ? (stats.home_ctx || stats) : (stats.away_ctx || stats);
    const ctxLabel = ctx === 'home' ? `Como local (${ctxSt?.n||0} partidos)` : `Como visitante (${ctxSt?.n||0} partidos)`;
    const formHTML = stats.form.map(r => `<div class="fd fd-${r}">${r}</div>`).join('');
    const recentHTML = stats.recent.map(g => `
      <div class="recent-item">
        <div class="ri-res fd-${g.result}">${g.result}</div>
        <div class="ri-opp">${g.home?'vs':'@'} ${g.opponent}</div>
        <div class="ri-score">${g.gf}–${g.ga}</div>
        <div class="ri-date">${g.date}</div>
      </div>`).join('');

    return `
      <div class="team-stat-card">
        <div class="tsc-name">${name}</div>
        <div class="tsc-ctx">${ctxLabel}</div>
        <div class="form-dots">${formHTML}</div>
        <div class="stat-line"><span class="sk">Victorias</span><span class="sv" style="color:var(--green)">${ctxSt?.win_pct||stats.win_pct}%</span></div>
        <div class="stat-line"><span class="sk">Empates</span><span class="sv" style="color:var(--yellow)">${ctxSt?.draw_pct||stats.draw_pct}%</span></div>
        <div class="stat-line"><span class="sk">Goles anotados/ptdo</span><span class="sv">${ctxSt?.avg_gf||stats.avg_gf}</span></div>
        <div class="stat-line"><span class="sk">Goles recibidos/ptdo</span><span class="sv">${ctxSt?.avg_ga||stats.avg_ga}</span></div>
        <div class="stat-line"><span class="sk">Total goles/ptdo</span><span class="sv">${ctxSt?.avg_total||stats.avg_total}</span></div>
        <div class="stat-line"><span class="sk">BTTS %</span><span class="sv">${ctxSt?.btts_pct||stats.btts_pct}%</span></div>
        <div class="stat-line"><span class="sk">Over 2.5 %</span><span class="sv">${ctxSt?.over25_pct||stats.over25_pct}%</span></div>
        <div class="stat-line"><span class="sk">Portería a 0 %</span><span class="sv">${ctxSt?.clean_sheet_pct||stats.clean_sheet_pct}%</span></div>
        <div class="recent-list">
          <div class="rl-title">Partidos recientes</div>
          ${recentHTML}
        </div>
      </div>`;
  }

  return `<div class="g2">${teamCard(hs, ev.home_team, 'home')}${teamCard(as, ev.away_team, 'away')}</div>`;
}

// ── TAB: ALINEACIONES ─────────────────────────────
function tabAlineacion({ event:ev, lineups }) {
  if (!lineups || lineups.lineup_status === 'unavailable' || !lineups.lineups)
    return '<div class="no-data">Alineaciones no disponibles aún.</div>';

  const home = lineups.lineups.home, away = lineups.lineups.away;
  const sl = {confirmed:'✅ Oficial',predicted:'🤖 Predicha IA'}[lineups.lineup_status] || lineups.lineup_status;

  function playerList(side) {
    const players = side?.players || [];
    if (!players.length) return '<div class="no-data">Sin datos</div>';
    return players.map(p => `
      <div class="player-item">
        <span class="pi-num">${p.jersey_number||''}</span>
        <span class="pi-name">${p.name}</span>
        <span class="pi-pos">${p.position}</span>
        ${p.ai_score ? `<span class="pi-score">${(p.ai_score*100).toFixed(0)}</span>` : ''}
      </div>`).join('');
  }

  const unavH = lineups.unavailable_players?.home || [];
  const unavA = lineups.unavailable_players?.away || [];

  const unavHTML = (team, list) => list.length ? `
    <div style="margin-top:.875rem">
      <div style="font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.375rem">Bajas ${team}</div>
      ${list.map(p => `<div style="font-size:13px;color:var(--td);padding:2px 0">❌ ${p.name} — <span style="color:var(--tm)">${p.reason}</span></div>`).join('')}
    </div>` : '';

  return `
    <div class="lineup-grid">
      <div class="card">
        <div class="sec-hdr">${ev.home_team} — ${sl}</div>
        ${home?.formation ? `<div style="font-size:12px;color:var(--tm);margin-bottom:.625rem">Formación: <b style="color:var(--t)">${home.formation}</b></div>` : ''}
        ${playerList(home)}
        ${unavHTML(ev.home_team, unavH)}
      </div>
      <div class="card">
        <div class="sec-hdr">${ev.away_team} — ${sl}</div>
        ${away?.formation ? `<div style="font-size:12px;color:var(--tm);margin-bottom:.625rem">Formación: <b style="color:var(--t)">${away.formation}</b></div>` : ''}
        ${playerList(away)}
        ${unavHTML(ev.away_team, unavA)}
      </div>
    </div>`;
}

// ── TAB: H2H ──────────────────────────────────────
function tabH2H({ event:ev, h2h }) {
  if (!h2h || !h2h.total_matches) return '<div class="no-data">Sin historial H2H indexado.</div>';
  const hW = h2h.home_wins||0, aW = h2h.away_wins||0, dr = h2h.draws||0;
  const tot = hW + aW + dr || 1;
  const hPct = Math.round(hW/tot*100), dPct = Math.round(dr/tot*100), aPct = 100-hPct-dPct;

  const recentHTML = (h2h.recent_matches||[]).slice(0,5).map(m => `
    <div class="recent-item">
      <span style="flex:1;color:var(--t)">${m.home} vs ${m.away}</span>
      <span style="font-weight:500">${m.score}</span>
      <span class="ri-date">${m.date?.split('T')[0]||''}</span>
    </div>`).join('');

  return `
    <div class="card">
      <div class="sec-hdr">Historial directo</div>
      <div class="h2h-visual">
        <div><div class="h2h-num" style="color:var(--blue)">${hW}</div><div class="h2h-lbl">${ev.home_team}</div></div>
        <div><div class="h2h-num" style="color:var(--yellow)">${dr}</div><div class="h2h-lbl">Empates</div></div>
        <div><div class="h2h-num" style="color:var(--purple)">${aW}</div><div class="h2h-lbl">${ev.away_team}</div></div>
      </div>
      <div class="h2h-bar">
        <div class="h2h-seg" style="width:${hPct}%;background:var(--blue)"></div>
        <div class="h2h-seg" style="width:${dPct}%;background:var(--yellow)"></div>
        <div class="h2h-seg" style="width:${aPct}%;background:var(--purple)"></div>
      </div>
      <div style="display:flex;gap:1.25rem;flex-wrap:wrap;font-size:13px;margin-bottom:.875rem">
        ${h2h.total_matches?`<span style="color:var(--tm)">Total: <b style="color:var(--t)">${h2h.total_matches}</b></span>`:''}
        ${h2h.avg_total_goals!=null?`<span style="color:var(--tm)">Goles/partido: <b style="color:var(--t)">${h2h.avg_total_goals?.toFixed(1)}</b></span>`:''}
        ${h2h.btts_pct!=null?`<span style="color:var(--tm)">BTTS: <b style="color:var(--t)">${Math.round(h2h.btts_pct*100)}%</b></span>`:''}
        ${h2h.over_25_pct!=null?`<span style="color:var(--tm)">Over 2.5: <b style="color:var(--t)">${Math.round(h2h.over_25_pct*100)}%</b></span>`:''}
      </div>
      ${recentHTML ? `<div class="sec-hdr">Enfrentamientos recientes</div>${recentHTML}` : ''}
    </div>`;
}

// ── TAB: RIESGOS ──────────────────────────────────
function tabRiesgos({ meta, event:ev, lineups, homeStats:hs, awayStats:as }) {
  const trap = meta?.trap || 0;
  const reasons = meta?.trap_reasons || [];
  const tc = trap <= 3 ? 'var(--green)' : trap <= 5 ? 'var(--yellow)' : 'var(--red)';

  const trapBarWidth = trap / 10 * 100;
  const unavH = lineups?.unavailable_players?.home || [];
  const unavA = lineups?.unavailable_players?.away || [];

  return `
    <div class="card">
      <div class="sec-hdr">Trap Score</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:.875rem">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:${tc}">${trap}<span style="font-size:18px;color:var(--td)">/10</span></div>
        <div style="flex:1">
          <div style="height:8px;background:var(--s2);border-radius:99px;overflow:hidden">
            <div style="width:${trapBarWidth}%;height:100%;background:${tc};border-radius:99px"></div>
          </div>
          <div style="font-size:12px;color:var(--tm);margin-top:4px">${trap<=3?'Riesgo bajo':trap<=5?'Riesgo moderado':trap<=7?'Riesgo alto':'Riesgo muy alto'}</div>
        </div>
      </div>
      ${reasons.length ? `<div class="trap-list">${reasons.map(r=>`<div class="trap-item">${r}</div>`).join('')}</div>` : '<div style="font-size:13px;color:var(--green)">✅ Sin factores de riesgo detectados</div>'}
    </div>

    ${(unavH.length || unavA.length) ? `
      <div class="card">
        <div class="sec-hdr">Bajas confirmadas</div>
        ${unavH.map(p=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:13px"><span style="color:var(--red)">❌</span><span style="flex:1;color:var(--t)">${p.name}</span><span style="color:var(--tm)">${p.reason}</span><span style="color:var(--td)">${ev.home_team}</span></div>`).join('')}
        ${unavA.map(p=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd);font-size:13px"><span style="color:var(--red)">❌</span><span style="flex:1;color:var(--t)">${p.name}</span><span style="color:var(--tm)">${p.reason}</span><span style="color:var(--td)">${ev.away_team}</span></div>`).join('')}
      </div>` : ''}

    <div class="card">
      <div class="sec-hdr">Indicadores de confianza</div>
      <div class="stat-line"><span class="sk">Confianza general</span><span class="sv" style="color:${pCol(meta?.confidence||0)}">${meta?.confidence||0}/100</span></div>
      <div class="stat-line"><span class="sk">Muestra estadística</span><span class="sv">${Math.round((meta?.sample_factor||0)*100)}% de óptimo</span></div>
      <div class="stat-line"><span class="sk">Modelo ML</span><span class="sv">${Math.round((meta?.model_confidence||0)*100)}% confianza</span></div>
      <div class="stat-line"><span class="sk">Partidos local analizados</span><span class="sv">${hs?.n||0}</span></div>
      <div class="stat-line"><span class="sk">Partidos visitante analizados</span><span class="sv">${as?.n||0}</span></div>
      <div class="stat-line"><span class="sk">Ventaja local estimada</span><span class="sv">${meta?.home_advantage!=null?meta.home_advantage+'/10':'—'}</span></div>
    </div>`;
}

handleHash();
loadEvents();
</script>
