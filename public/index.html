<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout — Análisis de Apuestas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

    :root {
      --bg: #0b0d11;
      --s1: #13161c;
      --s2: #1a1e27;
      --bd: rgba(255, 255, 255, .07);
      --bds: rgba(255, 255, 255, .13);
      --t: #dde1eb;
      --tm: #6b7491;
      --td: #3a3f55;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --orange: #fb923c;
      --r: 10px;
      --rl: 14px;
      --sidebar-w: 460px;
      --left-panel-w: 240px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* ── Panel izquierdo (filtros) ── */
    .left-panel {
      width: var(--left-panel-w);
      background: var(--s1);
      border-right: 1px solid var(--bd);
      padding: 1.5rem 1rem;
      overflow-y: auto;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 50;
      transition: transform 0.3s ease;
    }
    .left-panel h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--bd);
    }
    .league-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--t);
      padding: 6px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .league-filter:hover { background: var(--s2); }
    .league-filter input[type="checkbox"] { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; }
    .league-filter .lf-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Área principal ── */
    .main-area {
      margin-left: var(--left-panel-w);
      flex: 1;
      transition: margin-right 0.3s ease;
      margin-right: 0;
      max-width: 1200px;
      width: 100%;
      padding: 1.5rem 1.5rem 3rem;
    }
    .main-area.sidebar-open {
      margin-right: var(--sidebar-w);
    }

    /* Header */
    .hdr {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--bd);
      padding-bottom: 1rem;
    }
    .hdr-left h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }
    .hdr-left p { font-size: 0.9rem; color: var(--tm); margin-top: 2px; }

    /* Date nav */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .date-nav button {
      background: var(--s2);
      border: 1px solid var(--bd);
      color: var(--t);
      font-size: 1.4rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .date-nav button:hover { background: var(--s1); border-color: var(--bds); }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }
    .date-nav .date-label {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      min-width: 180px;
      text-align: center;
    }
    .date-nav .date-sub {
      font-size: 0.75rem;
      color: var(--tm);
      display: block;
    }

    /* Tarjetas de partido (stack) */
    .events-stack {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .event-card-big {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 1.1rem 1.5rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .event-card-big:hover { background: var(--s2); border-color: var(--bds); }
    .event-card-big .ec-time {
      font-size: 1rem;
      color: var(--tm);
      min-width: 60px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .ec-live { width: 8px; height: 8px; background: var(--red); border-radius: 50%; margin-bottom: 4px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .ec-teams {
      flex: 1;
      font-size: 1.15rem;
      font-weight: 600;
      color: #fff;
    }
    .ec-teams .vs { color: var(--td); font-weight: 400; font-size: 0.8rem; margin: 0 6px; }
    .ec-meta { font-size: 0.8rem; color: var(--tm); text-align: right; }
    .ec-meta .round { color: var(--td); }

    .empty-state, .loading-state {
      text-align: center;
      color: var(--td);
      font-size: 1rem;
      padding: 3rem 0;
    }
    .err-box { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); border-radius: var(--r); padding: 0.875rem 1rem; color: var(--red); font-size: 0.85rem; }

    /* ── Sidebar derecho (análisis) ── */
    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--sidebar-w);
      max-width: 100%;
      height: 100vh;
      background: var(--s1);
      border-left: 1px solid var(--bd);
      padding: 1.5rem;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar.open { transform: translateX(0); }
    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 0;
      color: var(--t);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.active { display: block; }

    /* ── Estilos internos del análisis (igual que antes) ── */
    .market-card, .stat-card {
      background: var(--s1);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .market-card.highlighted { border-color: rgba(74,222,128,.3); }
    .mc-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 0.875rem; }
    .mc-icon { width: 34px; height: 34px; border-radius: var(--r); background: var(--s2); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--tm); flex-shrink: 0; }
    .mc-title { font-size: 1.05rem; font-weight: 600; color: #fff; }
    .mc-sub { font-size: 0.85rem; color: var(--t); opacity: .8; margin-top: 2px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; }
    .bar-label { min-width: 80px; color: var(--t); }
    .bar-track { flex: 1; height: 5px; background: var(--s2); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
    .bar-val { min-width: 40px; text-align: right; font-weight: 600; font-size: 0.9rem; color: var(--t); }
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.875rem; }
    .team-col { background: var(--s2); border-radius: var(--r); padding: 10px; }
    .tc-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--t); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tc-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid var(--bd); }
    .tc-row:last-child { border-bottom: none; }
    .tc-val { font-weight: 500; }
    .rec-line { display: flex; align-items: center; gap: 8px; background: rgba(74,222,128,.06); border: 1px solid rgba(74,222,128,.15); border-radius: var(--r); padding: 8px 12px; margin-top: 0.75rem; font-size: 0.85rem; color: var(--t); }
    .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .stat-card .sc-title { font-size: 0.8rem; color: var(--tm); font-weight: 500; margin-bottom: 0.875rem; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .form-dots { display: flex; gap: 4px; margin-bottom: 0.75rem; }
    .dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .dot-W { background: rgba(74,222,128,.2); color: var(--green); }
    .dot-D { background: rgba(251,191,36,.15); color: var(--yellow); }
    .dot-L { background: rgba(248,113,113,.15); color: var(--red); }
    .recent-game { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--bd); font-size: 0.8rem; }
    .recent-game:last-child { border-bottom: none; }
    .rg-res { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .rg-opp { flex: 1; color: var(--t); opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rg-score { color: var(--t); font-weight: 500; }
    .rg-date { color: var(--td); font-size: 0.7rem; min-width: 50px; text-align: right; }
    .h2h-3 { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.5rem; text-align: center; margin-bottom: 0.75rem; }
    .h2h-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .h2h-lbl { font-size: 0.7rem; color: var(--td); text-transform: uppercase; letter-spacing: .06em; }
    .prob-track { height: 5px; background: var(--s2); border-radius: 99px; overflow: hidden; display: flex; }
    .prob-fill { height: 100%; border-radius: 99px; }
    .pred-banner { background: var(--s2); border-radius: var(--rl); padding: 1.25rem; margin-bottom: 0.75rem; text-align: center; }
    .pred-result { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .pred-sub { font-size: 0.85rem; color: var(--t); opacity: .75; }
    .pred-scores { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 0.875rem; }
    .pred-score-box { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r); padding: 8px 14px; text-align: center; min-width: 70px; }
    .psb-score { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
    .psb-prob { font-size: 0.75rem; color: var(--td); margin-top: 2px; }
    .pred-numbers { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .pn-box { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--rl); padding: 1rem; text-align: center; }
    .pn-label { font-size: 0.75rem; color: var(--t); opacity: .75; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    .pn-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: #fff; }
    .pn-unit { font-size: 0.75rem; color: var(--tm); margin-top: 3px; }
    .pn-range { font-size: 0.75rem; color: var(--tm); margin-top: 2px; }
    .player-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--bd); font-size: 0.8rem; }
    .player-row:last-child { border-bottom: none; }
    .p-num { font-size: 0.8rem; color: var(--td); min-width: 20px; }
    .p-name { flex: 1; font-size: 0.85rem; }
    .p-pos { font-size: 0.7rem; color: var(--tm); background: var(--s2); padding: 2px 7px; border-radius: 20px; }
    .p-score { font-size: 0.7rem; color: var(--td); }
    .sec-title { font-size: 0.75rem; letter-spacing: .1em; text-transform: uppercase; color: var(--tm); font-weight: 600; margin-bottom: 0.75rem; }
    .no-data { color: var(--td); font-style: italic; padding: 0.5rem 0; font-size: 0.85rem; }
    .scoreboard { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--rl); padding: 1.25rem 1.5rem; margin-bottom: 0.875rem; text-align: center; }
    .sb-inner { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 0.5rem 0; }
    .sb-team { flex: 1; }
    .sb-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
    .sb-sub { font-size: 0.7rem; color: var(--tm); }
    .sb-score { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; min-width: 80px; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .pill-live { background: rgba(248,113,113,.15); color: var(--red); }
    .pill-ns { background: rgba(96,165,250,.1); color: var(--blue); }
    .pill-fin { background: rgba(74,222,128,.1); color: var(--green); }
    .meta-strip { display: flex; gap: 8px; margin-bottom: 0.875rem; flex-wrap: wrap; }
    .meta-box { flex: 1; min-width: 80px; background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r); padding: 0.5rem 0.75rem; text-align: center; }
    .mb-label { font-size: 0.65rem; color: var(--tm); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 3px; }
    .mb-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; border-bottom: 1px solid var(--bd); padding-bottom: 0.5rem; }
    .tab { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; color: var(--tm); transition: all .15s; white-space: nowrap; }
    .tab:hover { color: var(--t); background: var(--s2); }
    .tab.active { background: var(--s2); border-color: var(--bds); color: #fff; }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Panel izquierdo de filtros -->
  <aside class="left-panel" id="leftPanel">
    <h2>🏆 Ligas</h2>
    <div id="leagueFilters"></div>
  </aside>

  <!-- Área principal -->
  <div class="main-area" id="mainArea">
    <div class="hdr">
      <div class="hdr-left">
        <h1>⚽ Scout</h1>
        <p>Análisis cuantitativo de apuestas</p>
      </div>
      <div style="font-size:0.9rem; color:var(--td)" id="todayDate"></div>
    </div>

    <div class="date-nav">
      <button id="prevBtn" onclick="changeDate(-1)">←</button>
      <div>
        <span class="date-label" id="dateDisplay">Hoy</span>
        <span class="date-sub" id="dateSub"></span>
      </div>
      <button id="nextBtn" onclick="changeDate(1)">→</button>
    </div>

    <div id="eventsStack" class="events-stack">
      <div class="loading-state">Cargando partidos…</div>
    </div>
  </div>
</div>

<!-- Sidebar derecho (análisis) -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">&times;</button>
  <div id="sidebarContent"></div>
</div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<script>
const $ = id => document.getElementById(id);

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit', timeZone:'America/Panama' });
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', timeZone:'America/Panama' });
}

$('todayDate').innerText = new Date().toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone:'America/Panama' });

// ──── Estado global ────
let allEventsByDate = {};
let sortedDates = [];
let currentIndex = 0;
let currentId = null, currentData = null, currentTab = 'resultado';
let visibleLeagues = new Set();
let allLeagues = [];

// ──── Carga inicial desde /api/today ────
async function loadInitialEvents() {
  try {
    const res = await fetch('/api/today');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const events = [...(data.today || []), ...(data.tomorrow || [])];
    const grouped = {};
    events.forEach(e => {
      const dateStr = e.event_date?.slice(0,10);
      if (!dateStr) return;
      if (!grouped[dateStr]) grouped[dateStr] = [];
      grouped[dateStr].push(e);
    });

    allEventsByDate = grouped;
    sortedDates = Object.keys(grouped).sort();

    const leagueSet = new Set();
    Object.values(grouped).forEach(evts => evts.forEach(e => {
      const league = e.group_name || e.league_name || 'Sin liga';
      leagueSet.add(league);
    }));
    allLeagues = Array.from(leagueSet).sort();
    visibleLeagues = new Set(allLeagues);
    renderLeagueFilters();

    if (sortedDates.length === 0) {
      $('eventsStack').innerHTML = '<div class="empty-state">No hay partidos programados.</div>';
      $('prevBtn').disabled = true;
      $('nextBtn').disabled = true;
      return;
    }

    const todayStr = new Date().toISOString().slice(0,10);
    currentIndex = sortedDates.indexOf(todayStr);
    if (currentIndex === -1) currentIndex = 0;

    updateDateUI();
    renderEventsForCurrentDate();
  } catch(e) {
    $('eventsStack').innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }
}

function renderLeagueFilters() {
  const container = $('leagueFilters');
  if (!allLeagues.length) {
    container.innerHTML = '<div style="font-size:0.8rem;color:var(--td)">Sin ligas</div>';
    return;
  }
  container.innerHTML = allLeagues.map(league => `
    <label class="league-filter">
      <input type="checkbox" ${visibleLeagues.has(league) ? 'checked' : ''} onchange="toggleLeague('${league.replace(/'/g, "\\'")}', this.checked)">
      <span class="lf-name">${league}</span>
    </label>
  `).join('');
}

function toggleLeague(league, isChecked) {
  if (isChecked) visibleLeagues.add(league);
  else visibleLeagues.delete(league);
  renderEventsForCurrentDate();
}

function changeDate(offset) {
  const newIndex = currentIndex + offset;
  if (newIndex < 0 || newIndex >= sortedDates.length) return;
  currentIndex = newIndex;
  updateDateUI();
  renderEventsForCurrentDate();
}

function updateDateUI() {
  const dateStr = sortedDates[currentIndex];
  const date = new Date(dateStr + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);

  if (date.toDateString() === today.toDateString()) {
    $('dateDisplay').innerText = 'Hoy';
  } else if (date.toDateString() === tomorrow.toDateString()) {
    $('dateDisplay').innerText = 'Mañana';
  } else {
    $('dateDisplay').innerText = date.toLocaleDateString('es', { weekday:'short', day:'numeric', month:'short' });
  }
  $('dateSub').innerText = date.toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long' });

  $('prevBtn').disabled = (currentIndex === 0);
  $('nextBtn').disabled = (currentIndex === sortedDates.length - 1);
}

// ──── RENDER DE EVENTOS (SIN AGRUPACIÓN) ────
function renderEventsForCurrentDate() {
  const dateStr = sortedDates[currentIndex];
  const allEvents = allEventsByDate[dateStr] || [];
  const filtered = allEvents.filter(e => {
    const league = e.group_name || e.league_name || 'Sin liga';
    return visibleLeagues.has(league);
  });

  if (!filtered.length) {
    $('eventsStack').innerHTML = '<div class="empty-state">No hay partidos visibles para esta fecha.</div>';
    return;
  }

  // Lista plana de tarjetas
  const cards = filtered.map(e => {
    const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(e.status);
    const isFin  = e.status === 'finished';
    const timeDisplay = isLive ? '<div class="ec-live"></div> EN VIVO' : (isFin ? 'Final' : fmtTime(e.event_date));
    const score = (isFin || isLive) ? `${e.home_score||0} – ${e.away_score||0}` : '';
    return `
      <div class="event-card-big" onclick="openAnalysis(${e.id})">
        <div class="ec-time">${timeDisplay}${score ? `<div style="font-size:1.1rem;color:#fff;margin-top:2px">${score}</div>` : ''}</div>
        <div class="ec-teams">${e.home_team} <span class="vs">vs</span> ${e.away_team}</div>
        <div class="ec-meta">
          <div style="color:var(--purple);font-weight:500;font-size:0.75rem">${e.group_name || ''}</div>
          ${e.round_name ? `<div class="round">${e.round_name}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  $('eventsStack').innerHTML = cards;
}

// ──── SIDEBAR Y ANÁLISIS (sin cambios) ────
function openSidebar() {
  $('mainArea').classList.add('sidebar-open');
  $('sidebar').classList.add('open');
  $('overlay').classList.add('active');
}
function closeSidebar() {
  $('mainArea').classList.remove('sidebar-open');
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('active');
  currentId = null;
}
async function openAnalysis(id) {
  if (currentId === id) return openSidebar();
  currentId = id;
  openSidebar();
  $('sidebarContent').innerHTML = '<div class="loading-state">Analizando…</div>';
  try {
    const r = await fetch(`/api/analyze?id=${id}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    currentData = data;
    currentTab = 'resultado';
    renderAnalysisSidebar(data);
  } catch(e) {
    $('sidebarContent').innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }
}
function renderAnalysisSidebar(d) {
  const tabs = [
    { id:'resultado',  label:'Resultado' },
    { id:'goles',      label:'Goles' },
    { id:'corners',    label:'Corners' },
    { id:'tarjetas',   label:'Tarjetas' },
    { id:'offsides',   label:'Fueras' },
    { id:'prediccion', label:'🔮 Predicción' },
    { id:'equipos',    label:'Equipos' },
    { id:'alineacion', label:'Alineaciones' },
    { id:'h2h',        label:'H2H' },
  ];
  const tabsHTML = tabs.map(t =>
    `<div class="tab ${t.id===currentTab?'active':''}" data-tab="${t.id}" onclick="switchSidebarTab('${t.id}')">${t.label}</div>`
  ).join('');

  $('sidebarContent').innerHTML = `
    <div style="margin-top:1.5rem">
      ${renderScoreboard(d.event, d.odds)}
      ${renderMeta(d.meta)}
      <div class="tabs">${tabsHTML}</div>
      <div id="tabContentSidebar">${renderTabContent(currentTab, d)}</div>
    </div>`;
}
function switchSidebarTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#sidebarContent .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  $('tabContentSidebar').innerHTML = renderTabContent(tab, currentData);
}
function barColor(p) { return p >= 65 ? '#4ade80' : p >= 45 ? '#fbbf24' : '#f87171'; }

// ──── RENDERERS DE PESTAÑAS (se incluye la función de Predicción mejorada) ────
function renderTabContent(tab, d) {
  switch(tab) {
    case 'resultado':  return renderResultado(d);
    case 'goles':      return renderGoles(d);
    case 'corners':    return renderCorners(d);
    case 'tarjetas':   return renderTarjetas(d);
    case 'offsides':   return renderOffsides(d);
    case 'prediccion': return renderPrediccion(d);
    case 'equipos':    return renderEquipos(d);
    case 'alineacion': return renderAlineacion(d);
    case 'h2h':        return renderH2H(d);
    default: return '';
  }
}

function renderScoreboard(ev, odds) {
  const isLive = ['1st_half','2nd_half','halftime','inprogress'].includes(ev.status);
  const isFin  = ev.status === 'finished';
  const isNS   = ev.status === 'notstarted';
  const sc = isNS ? `<span style="font-size:1.2rem;color:var(--td)">${fmtTime(ev.event_date)}</span>`
    : `${ev.home_score||'–'}<span style="color:var(--td);font-size:1.2rem;margin:0 4px">–</span>${ev.away_score||'–'}`;
  const statusLabel = {notstarted:'Por jugar',finished:'Finalizado','1st_half':'1ª Parte','2nd_half':'2ª Parte',halftime:'Descanso',inprogress:'En Juego',postponed:'Aplazado'}[ev.status]||ev.status;
  const sClass = isLive?'pill-live':isFin?'pill-fin':'pill-ns';
  return `
    <div class="scoreboard">
      <div><span class="pill ${sClass}">${statusLabel}</span>${isLive&&ev.current_minute?`<span style="margin-left:8px;font-size:0.8rem;color:var(--tm)">${ev.current_minute}'</span>`:''}</div>
      <div class="sb-inner">
        <div class="sb-team"><div class="sb-name">${ev.home_team}</div><div class="sb-sub">Local</div></div>
        <div class="sb-score">${sc}</div>
        <div class="sb-team"><div class="sb-name">${ev.away_team}</div><div class="sb-sub">Visitante</div></div>
      </div>
      <div style="font-size:0.8rem;color:var(--tm)">${fmtDate(ev.event_date)}</div>
      ${(odds?.home||odds?.draw||odds?.away)?`
        <div style="display:flex;gap:6px;margin-top:.75rem">
          ${odds.home?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:0.65rem;color:var(--td)">${ev.home_team.split(' ')[0]}</div><div style="font-size:1rem;font-weight:500">${odds.home.toFixed(2)}</div></div>`:''}
          ${odds.draw?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:0.65rem;color:var(--td)">Empate</div><div style="font-size:1rem;font-weight:500">${odds.draw.toFixed(2)}</div></div>`:''}
          ${odds.away?`<div style="flex:1;background:var(--s2);border-radius:var(--r);padding:7px;text-align:center"><div style="font-size:0.65rem;color:var(--td)">${ev.away_team.split(' ')[0]}</div><div style="font-size:1rem;font-weight:500">${odds.away.toFixed(2)}</div></div>`:''}
        </div>`:''}
    </div>`;
}
function renderMeta(meta) {
  if (!meta) return '';
  const cc = meta.confidence >= 70 ? 'var(--green)' : meta.confidence >= 50 ? 'var(--yellow)' : 'var(--red)';
  const tc = meta.trap <= 3 ? 'var(--green)' : meta.trap <= 5 ? 'var(--yellow)' : 'var(--red)';
  const mc = Math.round((meta.model_confidence||0)*100);
  const ls = {confirmed:'✅ Confirmada', predicted:'🤖 Predicha', unavailable:'⚠️ Sin datos'}[meta.lineup_status]||'—';
  return `
    <div class="meta-strip">
      <div class="meta-box"><div class="mb-label">Confianza</div><div class="mb-val" style="color:${cc}">${meta.confidence}/100</div></div>
      <div class="meta-box"><div class="mb-label">Trap</div><div class="mb-val" style="color:${tc}">${meta.trap}/10</div></div>
      <div class="meta-box"><div class="mb-label">Modelo</div><div class="mb-val">${mc}%</div></div>
      <div class="meta-box"><div class="mb-label">Alineación</div><div class="mb-val" style="font-size:0.8rem;padding-top:4px">${ls}</div></div>
    </div>`;
}

// Predicción con nombre de ganador y marcador
function renderPrediccion({ event:ev, prediction:pred, histStats, homeStats:hs, awayStats:as }) {
  if (!pred) return '<div class="no-data">Sin predicción ML.</div>';
  const mr = pred.markets?.match_result || {};
  const eg = pred.markets?.expected_goals || {};
  const sc = pred.markets?.score || {};
  const rec = pred.recommendations || {};
  const favorite = rec.favorite;
  const winnerText = favorite === 'H' ? `${ev.home_team} gana` : favorite === 'A' ? `${ev.away_team} gana` : 'Empate';
  const winnerProb = rec.favorite_prob != null ? rec.favorite_prob.toFixed(1) : '—';
  const predictedScore = sc.most_likely || null;
  const scoreProb = sc.probabilities?.[predictedScore] || sc.most_likely_prob || null;
  const scoreProbText = scoreProb != null ? ` (${(scoreProb*100).toFixed(1)}%)` : '';
  const xgH = eg.home || null;
  const xgA = eg.away || null;
  const xgTotal = xgH != null && xgA != null ? (xgH + xgA).toFixed(2) : null;
  const cornersEst = histStats?.corners?.avg || null;
  const cardsEst   = histStats?.cards?.avg   || null;

      <div class="pred-result">${winnerText}</div>
      <div class="pred-sub">Probabilidad ${winnerProb}% · Confianza ${Math.round((pred.model?.confidence||0)*100)}%</div>
      ${predictedScore ? `
        <div class="pred-scores">
          <div class="pred-score-box">
            <div class="psb-score">${predictedScore}</div>
            <div class="psb-prob">Marcador más probable${scoreProbText}</div>
          </div>
        </div>` : ''}
    </div>
    <div class="pred-numbers">
      <div class="pn-box">
        <div class="pn-label">Goles esperados</div>
        <div class="pn-val">${xgTotal || '—'}</div>
        <div class="pn-unit">total xG</div>
        ${xgH!=null?`<div class="pn-range">${ev.home_team.split(' ')[0]} ${xgH.toFixed(2)} · ${ev.away_team.split(' ')[0]} ${xgA.toFixed(2)}</div>`:''}
      </div>
      <div class="pn-box">
        <div class="pn-label">Corners esperados</div>
        <div class="pn-val">${cornersEst != null ? cornersEst.toFixed(1) : '—'}</div>
        <div class="pn-unit">corners est.</div>
      </div>
      <div class="pn-box">
        <div class="pn-label">Tarjetas esperadas</div>
        <div class="pn-val">${cardsEst != null ? cardsEst.toFixed(1) : '—'}</div>
        <div class="pn-unit">amarillas est.</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="sec-title">Probabilidades ML detalladas</div>
      <div class="bar-row"><span class="bar-label">${ev.home_team}</span><div class="bar-track"><div class="bar-fill" style="width:${mr.prob_home||0}%;background:var(--blue)"></div></div><span class="bar-val">${mr.prob_home?.toFixed(1)||'—'}%</span></div>
      <div class="bar-row"><span class="bar-label">Empate</span><div class="bar-track"><div class="bar-fill" style="width:${mr.prob_draw||0}%;background:var(--yellow)"></div></div><span class="bar-val">${mr.prob_draw?.toFixed(1)||'—'}%</span></div>
      <div class="bar-row"><span class="bar-label">${ev.away_team}</span><div class="bar-track"><div class="bar-fill" style="width:${mr.prob_away||0}%;background:var(--purple)"></div></div><span class="bar-val">${mr.prob_away?.toFixed(1)||'—'}%</span></div>
      <div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-top:.875rem;font-size:12px">
        ${pred.markets?.over_under?.prob_over_15!=null?`<span style="color:var(--td)">Over 1.5: <b style="color:var(--t)">${pred.markets.over_under.prob_over_15.toFixed(1)}%</b></span>`:''}
        ${pred.markets?.over_under?.prob_over_25!=null?`<span style="color:var(--td)">Over 2.5: <b style="color:var(--t)">${pred.markets.over_under.prob_over_25.toFixed(1)}%</b></span>`:''}
        ${pred.markets?.btts?.prob_yes!=null?`<span style="color:var(--td)">BTTS: <b style="color:var(--t)">${pred.markets.btts.prob_yes.toFixed(1)}%</b></span>`:''}
        ${offsidesEst!=null?`<span style="color:var(--td)">Fueras de lugar est.: <b style="color:var(--t)">${offsidesEst.toFixed(1)}</b></span>`:''}
      </div>
    </div>`;
}

// ──── RESTO DE RENDERERS (se mantienen igual que en la versión anterior) ────
function renderResultado({ event:ev, homeStats:hs, awayStats:as, prediction:pred }) {
  const mr = pred?.markets?.match_result || {};
  const hP = mr.prob_home || null;
  const dP = mr.prob_draw || null;
  const aP = mr.prob_away || null;
  const mc = pred?.model?.confidence || 0.3;
  const sf = Math.min(hs?.sample_factor||0, as?.sample_factor||0);
  const hForm = hs?.home_ctx?.win_pct || hs?.win_pct || 33;
  const aForm = as?.away_ctx?.win_pct || as?.win_pct || 33;
  const dForm = (((hs?.home_ctx?.draw_pct||hs?.draw_pct||25) + (as?.away_ctx?.draw_pct||as?.draw_pct||25)) / 2);
  function dynProb(ml, form) {
    if (ml == null) return Math.round(form * sf + 33 * (1 - sf));
    const w = Math.min(mc * 0.70, 0.70);
    const formAdj = form * sf + 33 * (1 - sf);
    return Math.round(ml * w + formAdj * (1 - w));
  }
  let hAdj = dynProb(hP, hForm);
  let dAdj = dynProb(dP, dForm);
  let aAdj = dynProb(aP, aForm);
  const total = hAdj + dAdj + aAdj || 100;
  hAdj = Math.round(hAdj / total * 100);
  aAdj = Math.round(aAdj / total * 100);
  dAdj = 100 - hAdj - aAdj;
  const bars = [
    { label: ev.home_team, prob: hAdj, color: 'var(--blue)' },
    { label: 'Empate',     prob: dAdj, color: 'var(--yellow)' },
    { label: ev.away_team, prob: aAdj, color: 'var(--purple)' },
  ];
  const barsHTML = bars.map(b => `
    <div class="bar-row">
      <span class="bar-label" style="min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${b.prob}%;background:${b.color}"></div></div>
      <span class="bar-val" style="color:${b.color}">${b.prob}%</span>
    </div>`).join('');
  const teamGrid = (hs && as) ? `
    <div class="team-grid" style="margin-top:.875rem">
      <div class="team-col">
        <div class="tc-name">${ev.home_team} (local)</div>
        <div class="tc-row"><span>Victorias</span><span class="tc-val" style="color:var(--green)">${hs.home_ctx?.win_pct||hs.win_pct}%</span></div>
        <div class="tc-row"><span>Empates</span><span class="tc-val" style="color:var(--yellow)">${hs.home_ctx?.draw_pct||hs.draw_pct}%</span></div>
        <div class="tc-row"><span>Goles/partido</span><span class="tc-val">${hs.home_ctx?.avg_gf||hs.avg_gf}</span></div>
        <div class="tc-row"><span>Portería a 0</span><span class="tc-val">${hs.home_ctx?.clean_sheet_pct||hs.clean_sheet_pct}%</span></div>
      </div>
      <div class="team-col">
        <div class="tc-name">${ev.away_team} (visitante)</div>
        <div class="tc-row"><span>Victorias</span><span class="tc-val" style="color:var(--green)">${as.away_ctx?.win_pct||as.win_pct}%</span></div>
        <div class="tc-row"><span>Empates</span><span class="tc-val" style="color:var(--yellow)">${as.away_ctx?.draw_pct||as.draw_pct}%</span></div>
        <div class="tc-row"><span>Goles/partido</span><span class="tc-val">${as.away_ctx?.avg_gf||as.avg_gf}</span></div>
        <div class="tc-row"><span>Portería a 0</span><span class="tc-val">${as.away_ctx?.clean_sheet_pct||as.clean_sheet_pct}%</span></div>
      </div>
    </div>` : '';
  return `
    <div class="market-card highlighted">
      <div class="mc-header">
        <div class="mc-icon">🏆</div>
        <div><div class="mc-title">Resultado final</div>
        <div class="mc-sub">ML ${hP!=null?Math.round(hP)+'%':'N/D'} · Forma local ${hForm}% victorias · Modelo ${Math.round(mc*100)}%</div></div>
      </div>
      ${barsHTML}
      ${teamGrid}
    </div>`;
}

function renderGoles({ event:ev, homeStats:hs, awayStats:as, prediction:pred, odds }) {
  if (!hs || !as) return '<div class="no-data">Sin datos suficientes.</div>';
  const hCtx = hs.home_ctx || hs;
  const aCtx = as.away_ctx || as;
  const avgGoals = ((hCtx.avg_total||hs.avg_total||0) + (aCtx.avg_total||as.avg_total||0)) / 2;
  const xgTotal = (pred?.markets?.expected_goals?.home||0) + (pred?.markets?.expected_goals?.away||0);
  const o15 = Math.round(((hCtx.over15_pct||hs.over15_pct||0) + (aCtx.over15_pct||as.over15_pct||0)) / 2);
  const o25 = Math.round(((hCtx.over25_pct||hs.over25_pct||0) + (aCtx.over25_pct||as.over25_pct||0)) / 2);
  const o35 = Math.round(((hCtx.over35_pct||hs.over35_pct||0) + (aCtx.over35_pct||as.over35_pct||0)) / 2);
  const btts = Math.round(((hCtx.btts_pct||hs.btts_pct||0) + (aCtx.btts_pct||as.btts_pct||0)) / 2);
  const recLine = avgGoals > 3 ? '2.5' : avgGoals > 2 ? '2.5' : '1.5';
  const lines = [
    { label:'Over 1.5', prob:o15, odds: odds?.over15 },
    { label:'Over 2.5', prob:o25, odds: odds?.over25 },
    { label:'Over 3.5', prob:o35, odds: null },
    { label:'BTTS',     prob:btts, odds: odds?.btts_yes },
  ];
  return `
    <div class="market-card highlighted">
      <div class="mc-header">
        <div class="mc-icon">⚽</div>
        <div><div class="mc-title">Over / Under goles</div>
        <div class="mc-sub">Prom. histórico ${avgGoals.toFixed(1)} goles/partido · xG combinado ${xgTotal.toFixed(2)}</div></div>
      </div>
      ${lines.map(l => `
        <div class="bar-row">
          <span class="bar-label">${l.label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${l.prob}%;background:${barColor(l.prob)}"></div></div>
          <span class="bar-val">${l.prob}%</span>
          ${l.odds ? `<span style="font-size:11px;color:var(--td);min-width:36px;text-align:right">${l.odds.toFixed(2)}</span>` : ''}
        </div>`).join('')}
      <div class="rec-line">
        <div class="rec-dot"></div>
        <span>Línea recomendada: <b>Over ${recLine}</b> — promedio ${avgGoals.toFixed(1)} goles</span>
      </div>
    </div>`;
}

function renderEquipos({ event:ev, homeStats:hs, awayStats:as }) {
  if (!hs && !as) return '<div class="no-data">Sin datos históricos.</div>';
  function teamCard(stats, name, ctx) {
    if (!stats) return `<div class="stat-card"><div class="sec-title">${name}</div><div class="no-data">Sin datos.</div></div>`;
    const ctxStats = ctx === 'home' ? (stats.home_ctx||stats) : (stats.away_ctx||stats);
    const ctxLabel = ctx === 'home' ? 'Como local' : 'Como visitante';
    const formHTML = stats.form.map(r => `<div class="dot dot-${r}">${r}</div>`).join('');
    const recent = stats.recent.map(g => {
      const res = g.gf > g.ga ? 'W' : g.gf < g.ga ? 'L' : 'D';
      return `<div class="recent-game">
        <div class="rg-res dot-${res}">${res}</div>
        <div class="rg-opp">${g.home?'vs':'@'} ${g.opponent}</div>
        <div class="rg-score">${g.gf}–${g.ga}</div>
        <div class="rg-date">${g.date}</div>
      </div>`;
    }).join('');
    return `
      <div class="stat-card">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:.625rem">${name}</div>
        <div class="form-dots">${formHTML}</div>
        <div style="font-size:10px;color:var(--purple);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.07em">${ctxLabel} (${ctxStats.n||0} partidos)</div>
        <div class="stat-row"><span class="sk">Victorias</span><span style="font-weight:500;color:var(--green)">${ctxStats.win_pct||stats.win_pct}%</span></div>
        <div class="stat-row"><span class="sk">Empates</span><span style="font-weight:500;color:var(--yellow)">${ctxStats.draw_pct||stats.draw_pct}%</span></div>
        <div class="stat-row"><span class="sk">Goles/partido</span><span style="font-weight:500">${ctxStats.avg_gf||stats.avg_gf}</span></div>
        <div class="stat-row"><span class="sk">Goles recibidos/partido</span><span style="font-weight:500">${ctxStats.avg_ga||stats.avg_ga}</span></div>
        <div class="stat-row"><span class="sk">BTTS</span><span style="font-weight:500">${ctxStats.btts_pct||stats.btts_pct}%</span></div>
        <div class="stat-row"><span class="sk">Over 2.5</span><span style="font-weight:500">${ctxStats.over25_pct||stats.over25_pct}%</span></div>
        <div class="stat-row"><span class="sk">Portería a 0</span><span style="font-weight:500">${ctxStats.clean_sheet_pct||stats.clean_sheet_pct}%</span></div>
        <div style="margin-top:.875rem"><div class="sc-title">Últimos partidos</div>${recent}</div>
      </div>`;
  }
  return `<div class="g2">${teamCard(hs, ev.home_team, 'home')}${teamCard(as, ev.away_team, 'away')}</div>`;
}

function renderH2H({ event:ev, h2h }) {
  if (!h2h || !h2h.total_matches) return '<div class="no-data">Sin historial H2H.</div>';
  const hW = h2h.home_wins||0, aW = h2h.away_wins||0, dr = h2h.draws||0;
  const total = hW + aW + dr || 1;
  return `
    <div class="stat-card">
      <div class="sec-title">Historial directo</div>
      <div class="h2h-3">
        <div><div class="h2h-val" style="color:var(--blue)">${hW}</div><div class="h2h-lbl">${ev.home_team}</div></div>
        <div><div class="h2h-val" style="color:var(--yellow)">${dr}</div><div class="h2h-lbl">Empates</div></div>
        <div><div class="h2h-val" style="color:var(--purple)">${aW}</div><div class="h2h-lbl">${ev.away_team}</div></div>
      </div>
      <div class="prob-track" style="height:6px;margin-bottom:.875rem">
        <div class="prob-fill" style="width:${Math.round(hW/total*100)}%;background:var(--blue)"></div>
        <div class="prob-fill" style="width:${Math.round(dr/total*100)}%;background:var(--yellow)"></div>
        <div class="prob-fill" style="width:${Math.round(aW/total*100)}%;background:var(--purple)"></div>
      </div>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.75rem">
        <span style="color:var(--td)">Total: <b style="color:var(--t)">${h2h.total_matches}</b></span>
        ${h2h.avg_total_goals!=null?`<span style="color:var(--td)">Goles/partido: <b style="color:var(--t)">${h2h.avg_total_goals?.toFixed(1)}</b></span>`:''}
        ${h2h.btts_pct!=null?`<span style="color:var(--td)">BTTS: <b style="color:var(--t)">${Math.round(h2h.btts_pct*100)}%</b></span>`:''}
        ${h2h.over_25_pct!=null?`<span style="color:var(--td)">Over 2.5: <b style="color:var(--t)">${Math.round(h2h.over_25_pct*100)}%</b></span>`:''}
      </div>
    </div>`;
}

function renderAlineacion({ event:ev, lineups }) {
  if (!lineups || lineups.lineup_status === 'unavailable' || !lineups.lineups)
    return '<div class="no-data">Alineaciones no disponibles.</div>';
  const home = lineups.lineups?.home, away = lineups.lineups?.away;
  const sl = {confirmed:'✅ Confirmada', predicted:'🤖 Predicha IA'}[lineups.lineup_status]||lineups.lineup_status;
  function pl(side) {
    const players = side?.players||[];
    if (!players.length) return '<div class="no-data">Sin datos</div>';
    return players.map(p => `
      <div class="player-row">
        <span class="p-num">${p.jersey_number||''}</span>
        <span class="p-name">${p.name}</span>
        <span class="p-pos">${p.position}</span>
        ${p.ai_score?`<span class="p-score">${(p.ai_score*100).toFixed(0)}</span>`:''}
      </div>`).join('');
  }
  const unavH = lineups.unavailable_players?.home||[];
  const unavA = lineups.unavailable_players?.away||[];
  return `
    <div class="g2">
      <div class="stat-card">
        <div class="sec-title">${ev.home_team} — ${sl}</div>
        ${home?.formation?`<div style="font-size:0.75rem;color:var(--tm);margin-bottom:.5rem">Formación: <b>${home.formation}</b></div>`:''}
        ${pl(home)}
        ${unavH.length?`<div style="margin-top:.75rem"><div style="font-size:0.7rem;color:var(--red);margin-bottom:4px">Bajas</div>${unavH.map(p=>`<div style="font-size:0.75rem;color:var(--td);padding:2px 0">❌ ${p.name} — ${p.reason}</div>`).join('')}</div>`:''}
      </div>
      <div class="stat-card">
        <div class="sec-title">${ev.away_team} — ${sl}</div>
        ${away?.formation?`<div style="font-size:0.75rem;color:var(--tm);margin-bottom:.5rem">Formación: <b>${away.formation}</b></div>`:''}
        ${pl(away)}
        ${unavA.length?`<div style="margin-top:.75rem"><div style="font-size:0.7rem;color:var(--red);margin-bottom:4px">Bajas</div>${unavA.map(p=>`<div style="font-size:0.75rem;color:var(--td);padding:2px 0">❌ ${p.name} — ${p.reason}</div>`).join('')}</div>`:''}
      </div>
    </div>`;
}

// Iniciar
loadInitialEvents();
</script>
</body>
</html>
